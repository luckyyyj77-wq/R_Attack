                                                                              <Sl k="width"       label="너비"         mn={10}  mx={400} st={2}    val={obs.width||80} />
                                                                              <Sl k="height"      label="높이"         mn={4}   mx={100} st={2}    val={obs.height||16} />
                                                                              <Sl k="restitution" label="반발력"        mn={0}   mx={1}   st={0.05} val={obs.restitution??0.7} />
                                                                              <div>
                                                                                <div className="flex justify-between mb-1"><span>회전(도)</span><span className="text-amber-300 font-mono">{Math.round((obs.angle||0)*180/Math.PI)}°</span></div>
                                                                                <input type="range" min={-180} max={180} step={5} value={Math.round((obs.angle||0)*180/Math.PI)} onChange={e=>upd({angle:parseFloat(e.target.value)*Math.PI/180})} className="w-full accent-amber-400" />
                                                                              </div>
                                                                            </>}
                                                                            {obs.type==="sinkhole" && <>
                                                                              <Sl k="radius"    label="반경"      mn={10}  mx={120} st={2}    val={obs.radius||28} />
                                                                              <Sl k="threshold" label="흡입 비율"  mn={0.1} mx={1}   st={0.05} val={obs.threshold??0.85} />
                                                                            </>}
                                                                            {obs.type==="magnet" && <>
                                                                              <Sl k="radius"     label="인력 범위"  mn={20}  mx={250} st={5}    val={obs.radius||85} />
                                                                              <Sl k="strength"   label="자력 세기"  mn={0.1} mx={2}   st={0.05} val={obs.strength??0.48} />
                                                                              <Sl k="bodyRadius" label="본체 크기"  mn={8}   mx={50}  st={1}    val={obs.bodyRadius||18} />
                                                                            </>}
                                                                            {obs.type==="crunch" && <>
                                                                              <Sl k="radius"     label="반경"          mn={8}   mx={80}   st={2}   val={obs.radius||22} />
                                                                              <Sl k="restitution" label="반동"         mn={0}   mx={1}    st={0.05} val={obs.restitution??0.25} />
                                                                              <Sl k="fragCount"  label="조각 수"       mn={2}   mx={8}    st={1}   val={obs.fragCount??4} />
                                                                              <Sl k="fragSpeed"  label="조각 속도"     mn={0.5} mx={10}   st={0.5} val={obs.fragSpeed??2.5} />
                                                                              <Sl k="fragTTL"   label="소멸 시간(ms)"  mn={200} mx={3000} st={100} val={obs.fragTTL??1200} />
                                                                            </>}
                                                                            <button onClick={()=>{setDevStage({...devStage,obstacles:devStage.obstacles.filter((_,idx)=>idx!==selectedObject.index)});setSelectedObject(null);}} className="w-full mt-1 py-1 bg-red-700 hover:bg-red-600 rounded text-white">🗑️ 삭제</button>
                                                                          </div>);
                                                                        })()}
                                                                  
                                                                      </div>
                                                                    </div>
                                                                  )}
                                                                  
                                                                  {/* ── 스테이지 요약 ────────────────────────────── */}
                                                                  {!selectedObject && (
                                                                    <div className="mt-4 p-3 bg-stone-800 rounded-lg border border-stone-600">
                                                                      <div className="text-slate-300 text-xs font-bold mb-2">📊 스테이지 현황</div>
                                                                      <div className="text-slate-400 text-xs space-y-1">
                                                                        <div>🔴 빨간 구슬 {devStage.marbles.length}개</div>
                                                                        <div>🔵 파란 구슬 1개</div>
                                                                        <div>🟢 스프링 {(devStage.springs||[]).length}개</div>
                                                                        <div>🧱 벽 {(devStage.obstacles||[]).filter(o=>o.type==="wall").length}개</div>
                                                                        <div>🕳️ 씽크홀 {(devStage.obstacles||[]).filter(o=>o.type==="sinkhole").length}개</div>
                                                                        <div>🧲 마그네틱 {(devStage.obstacles||[]).filter(o=>o.type==="magnet").length}개</div>
                                                                        <div>💥 크런치 {(devStage.obstacles||[]).filter(o=>o.type==="crunch").length}개</div>
                                                                      </div>
                                                                      <div className="mt-2 text-slate-500 text-xs">선택 툴(⬆️)로 오브젝트를 클릭하면 속성을 편집할 수 있습니다.</div>
                                                                    </div>
                                                                  )}

                                                                  {/* 하단 버튼들 */}
                                                                  <div className="border-t border-stone-700 pt-4 mt-4 space-y-2">
                                                                    {/* 테스트 모드 토글 */}
                                                                    <button
                                                                      onClick={() => { setIsTestMode(!isTestMode); if (!isTestMode) initStage(currentStage); }}
                                                                      className={`w-full py-3 rounded-lg font-bold transition-all ${
                                                                        isTestMode
                                                                          ? 'bg-amber-600 hover:bg-amber-700 text-white'
                                                                          : 'bg-green-600 hover:bg-green-700 text-white'
                                                                      }`}
                                                                    >
                                                                      {isTestMode ? '🛠️ 편집 모드로' : '▶️ 테스트 플레이'}
                                                                    </button>

                                                                    {/* 스테이지 초기화 */}
                                                                    <button
                                                                      onClick={() => {
                                                                        if (confirm('스테이지를 초기화하시겠습니까?')) {
                                                                          setDevStage({
                                                                            marbles: [],
                                                                            shooter: { x: 250, y: 250, mass: 1 },
                                                                            obstacles: [],
                                                                            springs: []
                                                                          });
                                                                        }
                                                                      }}
                                                                      className="w-full bg-orange-600 hover:bg-orange-700 text-white py-2 rounded-lg font-bold"
                                                                    >
                                                                      🗑️ 스테이지 초기화
                                                                    </button>

                                                                    {/* 물리 설정 리셋 */}
                                                                    <button
                                                                      onClick={() => setPhysicsConfig({
                                                                        timeScale: 1.0,
                                                                        friction: 0.98,
                                                                        bounceDamping: 0.7,
                                                                        gravity: 0.0,
                                                                        puckRadius: 15,
                                                                        defaultMass: 1,
                                                                        powerMultiplier: 1.0,
                                                                        collisionEnergyLoss: 0.92
                                                                      })}
                                                                      className="w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg font-bold"
                                                                    >
                                                                      🔄 물리 설정 리셋
                                                                    </button>

                                                                    {/* 퍼즐 모드로 돌아가기 */}
                                                                    <button
                                                                      onClick={() => {
                                                                        setIsDevMode(false);
                                                                        setShowDevPanel(false);
                                                                        setCurrentMode('puzzle');
                                                                        setIsTestMode(false);
                                                                        // 퍼즐 모드로 돌아갈 때 현재 스테이지 초기화
                                                                        initStage(currentStage);
                                                                      }}
                                                                      className="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-bold"
                                                                    >
                                                                      🎮 퍼즐 모드로 돌아가기
                                                                    </button>
                                                                  </div>
                                                                </div>
                                                              </div>
                                                            )}
                                                          </div>
                                    <div className="mt-4 bg-stone-700 border border-amber-900 rounded-lg p-4 shadow-inner">
                                      <h3 className="text-amber-100 font-bold mb-2">조작법</h3>
                                      <ul className="text-slate-300 text-sm space-y-1">
                                        <li>파란 구슬을 클릭하고 드래그하여 방향과 힘을 조절하세요.</li>
                                        <li>모든 빨간 구슬을 보드 밖으로 떨어뜨리면 승리합니다.</li>
                                        <li>매 5스테이지마다 힌트 1개를 획득합니다.</li>
                                      </ul>
                                    </div>
                                  </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MarblePuzzleGame />);
    </script>
</body>
</html>
