                                                                        <div>{T.summarySpring((devStage.springs||[]).length)}</div>
                                                                        <div>{T.summaryWall((devStage.obstacles||[]).filter(o=>o.type==="wall").length)}</div>
                                                                        <div>{T.summarySinkhole((devStage.obstacles||[]).filter(o=>o.type==="sinkhole").length)}</div>
                                                                        <div>{T.summaryMagnet((devStage.obstacles||[]).filter(o=>o.type==="magnet").length)}</div>
                                                                        <div>{T.summaryCrunch((devStage.obstacles||[]).filter(o=>o.type==="crunch").length)}</div>
                                                                      </div>
                                                                      <div className="mt-2 text-slate-500 text-xs">{T.summaryHint}</div>
                                                                    </div>
                                                                  )}

                                                                  {/* 하단 버튼들 */}
                                                                  <div className="border-t border-stone-700 pt-4 mt-4 space-y-2">
                                                                    {/* 테스트 모드 토글 */}
                                                                    <button
                                                                      onClick={() => { setIsTestMode(!isTestMode); if (!isTestMode) initStage(currentStage); }}
                                                                      className={`w-full py-3 rounded-lg font-bold transition-all ${
                                                                        isTestMode
                                                                          ? 'bg-amber-600 hover:bg-amber-700 text-white'
                                                                          : 'bg-green-600 hover:bg-green-700 text-white'
                                                                      }`}
                                                                    >
                                                                      {isTestMode ? T.backToEdit : T.testPlay}
                                                                    </button>

                                                                    {/* ★ 현재 스테이지 덮어쓰기 저장 ★ */}
                                                                    <button
                                                                      onClick={handleSaveOverride}
                                                                      className="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-lg font-bold shadow-lg border border-indigo-400"
                                                                    >
                                                                      💾 스테이지 {currentStage} 영구 저장
                                                                    </button>

                                                                    {/* ★ 전체 데이터 복사/초기화 ★ */}
                                                                    <div className="flex gap-2">
                                                                      <button
                                                                        onClick={handleExportAllStages}
                                                                        className="flex-1 bg-teal-700 hover:bg-teal-600 text-white py-2 rounded-lg font-bold text-xs"
                                                                      >
                                                                        📋 전체 JSON 복사
                                                                      </button>
                                                                      <button
                                                                        onClick={handleResetAllOverrides}
                                                                        className="flex-1 bg-red-900 hover:bg-red-800 text-white py-2 rounded-lg font-bold text-xs"
                                                                      >
                                                                        🔄 수정사항 초기화
                                                                      </button>
                                                                    </div>

                                                                    <div className="border-t border-stone-700 my-2"></div>

                                                                    {/* 스테이지 초기화 (편집창 비우기) */}
                                                                    <button
                                                                      onClick={() => {
                                                                        if (confirm(T.resetStageConfirm)) {
                                                                          setDevStage({
                                                                            marbles: [],
                                                                            shooter: { x: 250, y: 250, mass: 1 },
                                                                            obstacles: [],
                                                                            springs: [],
                                                                            greenBalls: []
                                                                          });
                                                                        }
                                                                      }}
                                                                      className="w-full bg-stone-700 hover:bg-stone-600 text-slate-300 py-2 rounded-lg font-bold text-sm"
                                                                    >
                                                                      🧹 편집창 비우기
                                                                    </button>

                                                                    {/* 물리 설정 리셋 */}
                                                                    <button
                                                                      onClick={() => setPhysicsConfig({
                                                                        timeScale: 1.0,
                                                                        friction: 0.98,
                                                                        bounceDamping: 0.7,
                                                                        gravity: 0.0,
                                                                        puckRadius: 15,
                                                                        defaultMass: 1,
                                                                        powerMultiplier: 1.0,
                                                                        collisionEnergyLoss: 0.92
                                                                      })}
                                                                      className="w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg font-bold"
                                                                    >
                                                                      {T.resetPhysics}
                                                                    </button>

                                                                    {/* 퍼즐 모드로 돌아가기 */}
                                                                    <button
                                                                      onClick={() => {
                                                                        setIsDevMode(false);
                                                                        setShowDevPanel(false);
                                                                        setCurrentMode('puzzle');
                                                                        setIsTestMode(false);
                                                                        // 퍼즐 모드로 돌아갈 때 현재 스테이지 초기화
                                                                        initStage(currentStage);
                                                                      }}
                                                                      className="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-bold"
                                                                    >
                                                                      {T.backToPuzzle}
                                                                    </button>
                                                                  </div>
                                                                </div>
                                                              </div>
                                                            )}
                                                            {/* Stage Selection Modal */}
                                                            {showStageSelect && (
                                                              <div className="fixed inset-0 bg-black bg-opacity-90 z-[100] flex items-center justify-center p-4 animate-pop-in">
                                                                <div className="bg-stone-800 border-2 border-amber-600 rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col">
                                                                  <div className="p-4 border-b border-stone-700 flex justify-between items-center bg-stone-900 rounded-t-xl">
                                                                    <h2 className="text-xl font-bold text-amber-400 flex items-center gap-2">
                                                                      📂 스테이지 선택 (1-99)
                                                                    </h2>
                                                                    <button 
                                                                      onClick={() => setShowStageSelect(false)}
                                                                      className="text-white hover:text-red-400 text-3xl leading-none"
                                                                    >
                                                                      ×
                                                                    </button>
                                                                  </div>
                                                                  
                                                                  <div className="flex-1 overflow-y-auto p-6 scrollbar-hide">
                                                                    <div className="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-8 gap-3">
                                                                      {gameStages.map((s) => {
                                                                        const isUnlocked = isDevMode || clearedStages.has(s.id);
                                                                        const isCurrent = currentStage === s.id;
                                                                        
                                                                        return (
                                                                          <button
                                                                            key={s.id}
                                                                            onClick={() => {
                                                                              if (isUnlocked) {
                                                                                setCurrentStage(s.id);
                                                                                initStage(s.id);
                                                                                // 개발자 모드라면 에디터 스테이지도 갱신
                                                                                if (isDevMode) {
                                                                                  setDevStage({ ...s });
                                                                                }
                                                                                setShowStageSelect(false);
                                                                                playSound('click');
                                                                              }
                                                                            }}
                                                                            className={`
                                                                              relative aspect-square rounded-lg font-bold text-sm transition-all flex flex-col items-center justify-center border-2
                                                                              ${isUnlocked 
                                                                                ? (isCurrent ? 'bg-amber-500 border-white text-stone-900 shadow-lg scale-105' : 'bg-stone-700 border-stone-600 text-amber-100 hover:bg-stone-600 hover:border-amber-400') 
                                                                                : 'bg-stone-900 border-stone-800 text-stone-600 cursor-not-allowed'}
                                                                            `}
                                                                            title={s.name}
                                                                          >
                                                                            {s.id}
                                                                            {!isUnlocked && <span className="text-[10px] mt-0.5">🔒</span>}
                                                                            {isUnlocked && !isDevMode && (
                                                                              <div className="flex mt-1">
                                                                                {[...Array(3)].map((_, i) => {
                                                                                  const stars = parseInt(localStorage.getItem(`stage_${s.id}_stars`) || '0', 10);
                                                                                  return <div key={i} className={`w-1.5 h-1.5 rounded-full mx-[1px] ${i < stars ? 'bg-yellow-400' : 'bg-stone-500'}`} />
                                                                                })}
                                                                              </div>
                                                                            )}
                                                                          </button>
                                                                        );
                                                                      })}
                                                                    </div>
                                                                  </div>
                                                                  
                                                                  <div className="p-4 bg-stone-900 border-t border-stone-700 rounded-b-xl text-center">
                                                                    <div className="text-slate-400 text-xs italic">
                                                                      {isDevMode ? "개발자 모드: 모든 스테이지를 수정할 수 있습니다." : "퍼즐을 클리어하여 다음 스테이지를 잠금 해제하세요!"}
                                                                    </div>
                                                                  </div>
                                                                </div>
                                                              </div>
                                                            )}
                                                          </div>
                                    <div className="mt-4 bg-stone-700 border border-amber-900 rounded-lg p-4 shadow-inner">
                                      <h3 className="text-amber-100 font-bold mb-2">{T.howToTitle}</h3>
                                      <ul className="text-slate-300 text-sm space-y-1">
                                        <li>{T.howTo1}</li>
                                        <li>{T.howTo2}</li>
                                        <li>{T.howTo3}</li>
                                      </ul>
                                    </div>
                                  </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MarblePuzzleGame />);
    </script>
</body>
</html>
