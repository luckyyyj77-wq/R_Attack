        <style>
          body {
            margin: 0;
            overflow-x: hidden;
            overflow-y: auto;
            background-color: #1a202c;
            /* 모바일 Safe Area (노치/홈바) 대응 */
            padding-bottom: env(safe-area-inset-bottom);
          }
          @keyframes pop-in {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
          }
          .animate-pop-in {
            animation: pop-in 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
          }
          @keyframes bounce-sm {
            0%, 100% {
              transform: scale(1);
            }
            50% {
              transform: scale(0.95);
            }
          }
          .animate-bounce-sm {
            animation: bounce-sm 0.15s ease-out;

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Web Audio API를 이용한 간단한 사운드 생성
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        const createCollisionSound = (volume = 1.0) => {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 200;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3 * volume, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.1);
        };

        const createShootSound = (volume = 1.0) => {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.setValueAtTime(400, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(200, audioContext.currentTime + 0.2);
            oscillator.type = 'square';

            gainNode.gain.setValueAtTime(0.2 * volume, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.2);
        };

        const createFallSound = (volume = 1.0) => {
            // 멀어지는 "피유유우웅" 소리 - 도플러 효과
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            // 높은 음에서 낮은 음으로 부드럽게 하강 (멀어지는 느낌)
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(150, audioContext.currentTime + 0.8);
            oscillator.type = 'sine'; // 부드러운 사인파

            // 볼륨도 서서히 페이드아웃 (멀어지는 느낌)
            gainNode.gain.setValueAtTime(0.25 * volume, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.8);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.8);
        };

        const createClickSound = (volume = 1.0) => {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 800;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3 * volume, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.05);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.05);
        };

        // Lucide React 아이콘
        const Play = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">

        const Pause = ({ size = 24, className = "" }) => (

                <rect x="14" y="4" width="4" height="16"></rect>

        const RotateCcw = ({ size = 24, className = "" }) => (

                <polyline points="1 4 1 10 7 10"></polyline>
                <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>

        const Lightbulb = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="9" y1="18" x2="15" y2="18"></line>

            </svg>
        );

        const Trophy = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path>
                <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path>
                <path d="M4 22h16"></path>
                <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path>
                <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path>
                <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path>

        );

        const ChevronLeft = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        );

        const ChevronRight = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        );

        const Star = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>

        const Settings = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.92c.04-.34.07-.68.07-1.08s-.03-.74-.07-1.08l2.32-1.84c.21-.16.27-.45.13-.69l-2.2-3.84c-.13-.24-.42-.32-.65-.24l-2.74 1.1c-.57-.44-1.18-.81-1.86-1.09l-.42-2.9c-.04-.26-.27-.44-.52-.44h-4.4c-.25 0-.47.18-.51.44l-.42 2.9c-.68.28-1.29.65-1.86 1.09l-2.74-1.1c-.23-.08-.52 0-.65.24l-2.2 3.84c-.14.24-.07.53.13.69l2.32 1.84c-.04.34-.07.69-.07 1.08s.03.74.07 1.08l-2.32 1.84c-.21.16-.27.45-.13.69l2.2 3.84c.13.24.42.32.65.24l2.74-1.1c.57.44 1.18.81 1.86 1.09l.42 2.9c.04.26.26.44.51.44h4.4c.25 0 .48-.18.52-.44l.42-2.9c.68-.28 1.29-.65 1.86-1.09l2.74 1.1c.23.08.52 0 .65-.24l2.2-3.84c.14-.24.07-.53-.13-.69l-2.32-1.84z"/>
            </svg>
        );

        const Undo = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 7v6h6"></path>
                <path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"></path>
            </svg>
        );


        // 게임 상수 - 전역으로 정의
        const CANVAS_SIZE = 700;
        const BOARD_SIZE = 500;
        const BOARD_OFFSET = (CANVAS_SIZE - BOARD_SIZE) / 2;
        const EDGE_PUSH_DISTANCE = 120; // 60 -> 120: 더 천천히 부드럽게 밀려나감
        const PHYSICS_FPS = 60;
        const PHYSICS_INTERVAL = 1000 / PHYSICS_FPS;

        const findValidTeleportPosition = (marbles, obstacles, currentMarbleId, puckRadius = 15) => {
            const MAX_ATTEMPTS = 100;
            for (let i = 0; i < MAX_ATTEMPTS; i++) {
                const newX = puckRadius + Math.random() * (BOARD_SIZE - puckRadius * 2);
                const newY = puckRadius + Math.random() * (BOARD_SIZE - puckRadius * 2);

                let overlap = false;

                // Check overlap with other marbles
                for (const otherMarble of marbles) {
                    if (otherMarble.id === currentMarbleId) continue;
                    const dx = newX - otherMarble.x;
                    const dy = newY - otherMarble.y;
                    if (Math.sqrt(dx * dx + dy * dy) < puckRadius * 2) {
                        overlap = true;
                        break;
                    }
                }
                if (overlap) continue;

                // Check overlap with obstacles
                for (const obstacle of obstacles) {
                    const closestX = Math.max(obstacle.x, Math.min(newX, obstacle.x + obstacle.width));
                    const closestY = Math.max(obstacle.y, Math.min(newY, obstacle.y + obstacle.height));
                    const dx = newX - closestX;
                    const dy = newY - closestY;
                    if (Math.sqrt(dx * dx + dy * dy) < puckRadius) {
                        overlap = true;
                        break;
                    }
                }
                if (overlap) continue;

                return { x: newX, y: newY };
            }
            // If no valid position found after max attempts, return null
            return null;
        };

        const shouldFall = (marble, puckRadius = 15) => {
            const overLeft = puckRadius - marble.x;
            const overRight = marble.x - (BOARD_SIZE - puckRadius);
            const overTop = puckRadius - marble.y;
            const overBottom = marble.y - (BOARD_SIZE - puckRadius);

            const touchingEdges = [];
            if (overLeft > 0) touchingEdges.push('left');
            if (overRight > 0) touchingEdges.push('right');
            if (overTop > 0) touchingEdges.push('top');
            if (overBottom > 0) touchingEdges.push('bottom');

            // 모서리(2개 이상 경계 촉)와 일반 경계(1개 경계 촉)를 다르게 처리
            // 완전히 떨어지기 전에 더 본격적으로 (70%가 넘어가면 떨어짐)
            if (touchingEdges.length >= 2) {
                const threshold = puckRadius * 0.7;
                return overLeft > threshold || overRight > threshold || overTop > threshold || overBottom > threshold;
            } else if (touchingEdges.length === 1) {
                const threshold = puckRadius * 0.7;
                return overLeft > threshold || overRight > threshold || overTop > threshold || overBottom > threshold;
            }
            return false;
        };

        const createFallingMarble = (marble, isRed, puckRadius = 15) => {
            const overLeft = puckRadius - marble.x;
            const overRight = marble.x - (BOARD_SIZE - puckRadius);
            const overTop = puckRadius - marble.y;
            const overBottom = marble.y - (BOARD_SIZE - puckRadius);

            // 현재 위치에서 그냥 시작 (위치 조정 없음)
            let startX = marble.x;
            let startY = marble.y;

            // 속도 방향을 기반으로 낙하 방향 결정 (더 자연스러움)
            const velocityMagnitude = Math.sqrt(marble.vx * marble.vx + marble.vy * marble.vy);

            let pushDirectionX = 0;
            let pushDirectionY = 0;

            // 속도가 충분히 있으면 속도 방향으로 밀어냄
            if (velocityMagnitude > 0.3) {
                // 속도 방향 정규화
                const normalizedVx = marble.vx / velocityMagnitude;
                const normalizedVy = marble.vy / velocityMagnitude;

                // 속도 방향을 그냥 사용 (정규화된 값)
                pushDirectionX = normalizedVx;
                pushDirectionY = normalizedVy;
            } else {
                // 속도가 거의 없으면 경계에서 가장 가까운 방향으로 밀어냄
                if (overLeft > overRight && overLeft > 0) {
                    pushDirectionX = -1;
                } else if (overRight > 0) {
                    pushDirectionX = 1;
                }

                if (overTop > overBottom && overTop > 0) {
                    pushDirectionY = -1;
                } else if (overBottom > 0) {
                    pushDirectionY = 1;
                }
            }

            return {
                ...marble,
                startX: startX,
                startY: startY,
                pushDirectionX: pushDirectionX,
                pushDirectionY: pushDirectionY,
                fallProgress: 0,
                startSize: puckRadius,
                isRed: isRed
            };
        };

        // 씽크홀 전용 낙하 오브젝트 생성 — 구멍 중심으로 빨려들어가는 방향
        const createSinkholeFallingMarble = (marble, isRed, sinkhole, puckRadius = 15) => {
            const dx = sinkhole.x - marble.x;
            const dy = sinkhole.y - marble.y;
            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
            return {
                ...marble,
                startX: marble.x,
                startY: marble.y,
                pushDirectionX: dx / dist,   // 구멍 중심 방향
                pushDirectionY: dy / dist,
                fallProgress: 0,
                startSize: puckRadius,
                isRed: isRed,
                fallType: 'sinkhole',        // 렌더러 분기용 플래그
                pullDistance: dist + 4,      // 중심까지 이동 거리
            };
        };

        const MarblePuzzleGame = () => {
          const lastCollisionSoundTime = useRef(0);

          // Load high score from localStorage on mount
          useEffect(() => {
            const storedHighScore = parseInt(localStorage.getItem('highScore') || '0', 10);
            setHighScore(storedHighScore);
          }, []);

          const playSound = (soundName, options = {}) => {
              if (!soundEnabled) return; // Don't play if sound is disabled

              if (soundName === 'collision') {
                  const now = Date.now();
                  if (now - lastCollisionSoundTime.current < 50) { // 50ms throttle
                      return;
                  }
                  lastCollisionSoundTime.current = now;
              }

              // 볼륨 조절을 위해 마스터 볼륨 적용
              const finalVolume = (options.volume || 1.0) * masterVolume;

              try {
                  if (soundName === 'collision') {
                      createCollisionSound(finalVolume);
                  } else if (soundName === 'shoot') {
                      createShootSound(finalVolume);
                  } else if (soundName === 'fall') {
                      createFallSound(finalVolume);
                  } else if (soundName === 'click') {
                      createClickSound(finalVolume);
                  }
              } catch (err) {
                  // 오디오 재생 실패 무시
              }
          };

          const canvasRef = useRef(null);
          const woodTextureRef = useRef(null);
          const hasFallenRef = useRef(false); // 파란 구슬이 이미 떨어졌는지 추적
          const [gameState, setGameState] = useState('ready');
          const [currentStage, setCurrentStage] = useState(1);
          const [marbles, setMarbles] = useState([]);
          const [shooterMarble, setShooterMarble] = useState({ x: 0, y: 0 });
          const [fallingMarbles, setFallingMarbles] = useState([]);
          const [shooterFalling, setShooterFalling] = useState(null);
          const shooterFallingRef = useRef(shooterFalling);
          shooterFallingRef.current = shooterFalling;
          const [showSettings, setShowSettings] = useState(false); // New state for settings modal
          const [masterVolume, setMasterVolume] = useState(1.0); // New state for master volume
          const [soundEnabled, setSoundEnabled] = useState(true); // New state for sound on/off

          // 구슬 커스텀 이미지 (일반 + 충돌)
          const [redMarbleImgUrl,    setRedMarbleImgUrl]    = useState(() => localStorage.getItem('redMarbleImg')    || null);
          const [redCollisionImgUrl, setRedCollisionImgUrl] = useState(() => localStorage.getItem('redCollisionImg') || null);
          const [blueMarbleImgUrl,   setBlueMarbleImgUrl]   = useState(() => localStorage.getItem('blueMarbleImg')   || null);
          const [blueCollisionImgUrl,setBlueCollisionImgUrl]= useState(() => localStorage.getItem('blueCollisionImg')|| null);
          const redMarbleImgRef      = useRef(null);
          const redCollisionImgRef   = useRef(null);
          const blueMarbleImgRef     = useRef(null);
          const blueCollisionImgRef  = useRef(null);

          // 이미지 URL → HTMLImageElement 변환
          const loadImg = (url, ref) => {
            if (!url) { ref.current = null; return; }
            const img = new Image();
            img.onload = () => { ref.current = img; };
            img.src = url;
          };
          useEffect(() => loadImg(redMarbleImgUrl,    redMarbleImgRef),    [redMarbleImgUrl]);
          useEffect(() => loadImg(redCollisionImgUrl, redCollisionImgRef), [redCollisionImgUrl]);
          useEffect(() => loadImg(blueMarbleImgUrl,   blueMarbleImgRef),   [blueMarbleImgUrl]);
          useEffect(() => loadImg(blueCollisionImgUrl,blueCollisionImgRef),[blueCollisionImgUrl]);

          // 이미지 업로드 핸들러 (파일 → base64)
          const handleImgUpload = (e, setUrl, storageKey) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
              const url = ev.target.result;
              setUrl(url);
              try { localStorage.setItem(storageKey, url); } catch(_) {}
            };
            reader.readAsDataURL(file);
          };
          const clearImg = (setUrl, ref, storageKey) => {
            setUrl(null);
            ref.current = null;
            localStorage.removeItem(storageKey);
          };
          const [shotsTaken, setShotsTaken] = useState(0); // New state for shots taken per stage
          const [lastStageStars, setLastStageStars] = useState(0); // New state for stars earned in the last cleared stage
          const [score, setScore] = useState(0); // New state for current score
          const [comboCount, setComboCount] = useState(0); // New state for combo count within a shot
          const [highScore, setHighScore] = useState(0); // New state for high score
          const collisionPopRef = useRef({}); // New ref to track marble collision for pop animation
          const springCooldownRef = useRef({}); // 스프링 재진입 방지 쿨다운 {marbleId: timestamp}
          const [dynamicObstacles, setDynamicObstacles] = useState([]); // 런타임 장애물 (크런치 조각 포함)
          const [greenBalls, setGreenBalls] = useState([]); // 그린 고무공 (탄성)
          const crunchCooldownRef = useRef({}); // 크런치 재충돌 방지 {obstacleId: timestamp}
          // 렌더 RAF 클로저용 — 항상 최신 state를 참조
          const renderStateRef = useRef({});
          const [particles, setParticles] = useState([]); // New state for particles
          const [aimEnd, setAimEnd] = useState(null);
          const [isPaused, setIsPaused] = useState(false); // New state for pause functionality
          const [hintsRemaining, setHintsRemaining] = useState(0);
          const [showTrajectory, setShowTrajectory] = useState(false);
          const [attemptsLeft, setAttemptsLeft] = useState(Infinity);
          const [stagesCleared, setStagesCleared] = useState(0);
          const [clearedStages, setClearedStages] = useState(new Set([1])); // 클리어한 스테이지 추적
          const [language, setLanguage] = useState('KR'); // 언어 상태 (KR/EN)

          const TEXTS = {
            KR: {
              // 헤더
              title: '알까기 퍼즐 게임',
              stage: '스테이지', of: '/', stageName: (n, name) => name,
              attempts: '남은 기회', infinite: '무한', infinity: '∞',
              hint: '힌트', score: '점수', best: '최고 점수', bestShort: '최고',
              chances: '기회',
              // 게임 상태 오버레이
              stageClear: '스테이지 클리어!', testDone: '테스트 완료!',
              shotsLabel: (n) => `발사 횟수: ${n}회`,
              starsLabel: (n) => `획득 별: ${'★'.repeat(n)}${'☆'.repeat(3-n)}`,
              nextStage: '다음 스테이지', retry: '다시 시도', close: '닫기',
              failed: '실패!', failedMsg: '모든 기회를 사용했습니다',
              paused: '일시정지', pausedMsg: '게임을 재개하려면 재개 버튼을 누르세요', resume: '재개',
              allClear: '축하합니다!', allClearMsg: '모든 스테이지를 클리어했습니다!', restart: '처음부터 다시',
              // 설정 모달
              settings: '설정', volume: '볼륨', sound: '사운드',
              marbleImageCustom: '🎨 구슬 이미지 커스텀',

            // 테두리 (어두운 나무)
            textureCtx.strokeStyle = '#5a4d3f';
            textureCtx.lineWidth = 6;
            textureCtx.strokeRect(0, 0, BOARD_SIZE, BOARD_SIZE);

            // 테두리 안쪽 하이라이트
            textureCtx.strokeStyle = '#e8dcc8';
            textureCtx.lineWidth = 2;
            textureCtx.strokeRect(3, 3, BOARD_SIZE - 6, BOARD_SIZE - 6);

            woodTextureRef.current = textureCanvas;
          }, []);

          useEffect(() => {
            initStage(currentStage);
          }, [currentStage]);

          // 전역 포인터 이벤트 - 캔버스 밖에서도 감지
          useEffect(() => {
            const handleGlobalPointerUp = (e) => {
              if (gameState === 'aiming') {
                handlePointerUp(e);
              }
            };

            const handleGlobalPointerMove = (e) => {
              if (gameState === 'aiming') {
                handlePointerMove(e);
              }
            };

            document.addEventListener('pointerup', handleGlobalPointerUp);
            document.addEventListener('pointermove', handleGlobalPointerMove);

            return () => {
              document.removeEventListener('pointerup', handleGlobalPointerUp);
              document.removeEventListener('pointermove', handleGlobalPointerMove);
            };
          }, [gameState, aimEnd, shooterMarble]);

          // 캔버스 터치 이벤트 리스너 등록 (passive: false로 preventDefault 사용)
          useEffect(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;

            const preventDefaultHandler = (e) => {
              if (gameState === 'aiming') {
                e.preventDefault();
              }
            };

            // passive: false로 등록하여 preventDefault 가능하게 함
            canvas.addEventListener('touchstart', preventDefaultHandler, { passive: false });
            canvas.addEventListener('touchmove', preventDefaultHandler, { passive: false });
            canvas.addEventListener('touchend', preventDefaultHandler, { passive: false });

            return () => {
              canvas.removeEventListener('touchstart', preventDefaultHandler);
              canvas.removeEventListener('touchmove', preventDefaultHandler);
              canvas.removeEventListener('touchend', preventDefaultHandler);
            };
          }, [gameState]);

          // 스테이지 데이터 상태 (사용자 수정본 포함)
          const [gameStages, setGameStages] = useState(stages);

          // 로컬 저장소에서 수정된 스테이지 로드
          useEffect(() => {
            const savedOverrides = localStorage.getItem('r_attack_stage_overrides');
            if (savedOverrides) {
              try {
                const overrides = JSON.parse(savedOverrides);
                const newGameStages = stages.map(s => overrides[s.id] ? { ...s, ...overrides[s.id] } : s);
                setGameStages(newGameStages);
              } catch (e) {
                console.error("Failed to load stage overrides", e);
              }
            }
          }, []);

          // 스테이지 초기화 함수 수정 (gameStages 사용)
          const initStage = (stageNum) => {
            // 개발자 모드일 때는 devStage 사용, 아니면 병합된 gameStages 사용
            const stage = isDevMode ? devStage : gameStages.find(s => s.id === stageNum);
            if (stage) {
              setMarbles(isDevMode ? devStage.marbles.map(m => ({ ...m, id: m.id || Math.random() })) : stage.marbles.map(m => ({ ...m, id: Math.random() })));
              setShooterMarble({ ...(isDevMode ? devStage.shooter : stage.shooter), vx: 0, vy: 0 });
              setGreenBalls(isDevMode ? (devStage.greenBalls || []).map(g => ({ ...g, id: g.id || Math.random(), vx: 0, vy: 0 })) : (stage.greenBalls || []).map(g => ({ ...g, id: Math.random(), vx: 0, vy: 0 })));
              setFallingMarbles([]);
              setShooterFalling(null);
              hasFallenRef.current = false;
              setAttemptsLeft(isDevMode ? Infinity : (stage.maxAttempts || Infinity));
              setShowTrajectory(false);
              setGameState('ready');
              setGameHistory([]);
              setAimEnd(null);
              setShotsTaken(0);
              setLastStageStars(0);
              setScore(0);
              stuckFrameCountRef.current = 0;
              lastPositionsRef.current = { shooter: null, marbles: [] };
              const stageObstacles = (isDevMode ? devStage : stage)?.obstacles || [];
              setDynamicObstacles(stageObstacles.map((o, i) => ({ ...o, _id: `obs_${i}_${Date.now()}` })));
              crunchCooldownRef.current = {};
            }
          };

          // 떨어지는 마블 애니메이션 (상태 업데이트)
          useEffect(() => {
            if (fallingMarbles.length === 0 && !shooterFalling || isPaused) return; // Pause falling animation if game is paused

            const animateFalling = () => {
              setFallingMarbles(prev => {
                const fallingReds = prev.filter(fm => fm.fallProgress < 1 && fm.fallProgress + 0.006 >= 1 && fm.isRed);
                if (fallingReds.length > 0) {
                  setComboCount(currentCombo => {
                    const newCombo = currentCombo + fallingReds.length;
                    // 연쇄 점수 계산: 각 공마다 (기본 100 * 현재 콤보)
                    let bonusScore = 0;
                    for(let i = 1; i <= fallingReds.length; i++) {
                      bonusScore += 100 * (currentCombo + i);
                    }
                    setScore(s => s + bonusScore);
                    return newCombo;
                  });
                }

                return prev.map(fm => ({
                  ...fm,
                  fallProgress: fm.fallProgress + 0.006
                })).filter(fm => fm.fallProgress < 1);
              });

              if (shooterFalling) {
                setShooterFalling(prev => {
                  if (!prev) return null;
                  const newProgress = prev.fallProgress + 0.006; // 0.01 -> 0.006: 더 부드럽고 천천히
                  if (newProgress >= 1) {
                    // 파란 구슬이 완전히 떨어지면 게임 오버 (무한 기회가 아닌 경우에만)
                    setTimeout(() => {
                      setAttemptsLeft(current => {
                        if (current === Infinity) {
                          // 무한 기회 모드: 스테이지 재시작
                          initStage(currentStage);
                          return current;
                        } else {
                          // 일반 모드: 게임 오버
                          setGameState('failed');
                          return current;
                        }
                      });
                    }, 100);
                    return null;
                  }
                  return { ...prev, fallProgress: newProgress };
                });
              }
            };

            const intervalId = setInterval(animateFalling, 16);

            return () => clearInterval(intervalId);
          }, [fallingMarbles, shooterFalling, isPaused]);

          // 물리 엔진
          useEffect(() => {
            if (gameState !== 'shooting' || isPaused) {
              if (animationRef.current) {
                cancelAnimationFrame(animationRef.current);
                animationRef.current = null;
              }
              return;
            }

            const canvas = canvasRef.current;
            if (!canvas) return;

            let lastPhysicsUpdateTime = performance.now();

            const gameLoop = (currentTime) => {
              animationRef.current = requestAnimationFrame(gameLoop);

              const deltaTime = currentTime - lastPhysicsUpdateTime;

              if (deltaTime >= PHYSICS_INTERVAL) {
                lastPhysicsUpdateTime = currentTime - (deltaTime % PHYSICS_INTERVAL);

                let fallSoundPlayedThisFrame = false; // Flag to prevent multiple fall sounds per frame

                // 물리 엔진은 일정한 속도로 작동
                let timeScale = physicsConfig.timeScale;

                // physicsConfig 값을 로컬 변수로 추출 (성능 최적화)
                const puckRadius = physicsConfig.puckRadius;


                // 물리 엔진 정지 체크
                const currentPositions = {
                  shooter: { x: shooterMarble.x, y: shooterMarble.y },
                  marbles: marbles.map(m => ({ x: m.x, y: m.y }))
                };

                if (lastPositionsRef.current.shooter) {
                  const shooterMoved = Math.abs(currentPositions.shooter.x - lastPositionsRef.current.shooter.x) > 0.01 ||
                                      Math.abs(currentPositions.shooter.y - lastPositionsRef.current.shooter.y) > 0.01;
                  const marblesMoved = currentPositions.marbles.some((m, i) => {
                    if (!lastPositionsRef.current.marbles[i]) return true;
                    return Math.abs(m.x - lastPositionsRef.current.marbles[i].x) > 0.01 ||
                           Math.abs(m.y - lastPositionsRef.current.marbles[i].y) > 0.01;
                  });

                  if (!shooterMoved && !marblesMoved &&
                      (Math.abs(shooterMarble.vx) > 0.01 || Math.abs(shooterMarble.vy) > 0.01)) {
                    stuckFrameCountRef.current++;
                  } else {
                    stuckFrameCountRef.current = 0;
                  }

                  if (stuckFrameCountRef.current > (5 * PHYSICS_FPS)) { // 5초
                    stuckFrameCountRef.current = 0;
                    let newShooter = { ...shooterMarble };
                    if (newShooter.x < BOARD_SIZE / 2) newShooter.vx = -5; else newShooter.vx = 5;
                    if (newShooter.y < BOARD_SIZE / 2) newShooter.vy = -5; else newShooter.vy = 5;
                    setShooterMarble(newShooter);
                    return;
                  }
                }

                lastPositionsRef.current = currentPositions;

                let newShooter = { ...shooterMarble };
                let newMarbles = marbles.map(marble => ({ ...marble }));
                const GREEN_RESTITUTION = 1.15; // 탄성 계수 (1.0 초과 = 에너지 증폭)
                let newGreenBalls = greenBalls.map(g => ({ ...g }));

                // 경계 근처 미끄러짐 효과를 위한 헬퍼 함수
                const applyEdgePhysics = (marble) => {
                  const overLeft = physicsConfig.puckRadius - marble.x;
                  const overRight = marble.x - (BOARD_SIZE - physicsConfig.puckRadius);
                  const overTop = physicsConfig.puckRadius - marble.y;
                  const overBottom = marble.y - (BOARD_SIZE - physicsConfig.puckRadius);

                  // 경계와의 비율 계산 (0 ~ 1, 1은 완전히 넘어감)
                  const edgeRatio = {
                    left: Math.max(0, Math.min(1, overLeft / physicsConfig.puckRadius)),
                    right: Math.max(0, Math.min(1, overRight / physicsConfig.puckRadius)),
                    top: Math.max(0, Math.min(1, overTop / physicsConfig.puckRadius)),
                    bottom: Math.max(0, Math.min(1, overBottom / physicsConfig.puckRadius))
                  };

                  const maxEdgeRatio = Math.max(edgeRatio.left, edgeRatio.right, edgeRatio.top, edgeRatio.bottom);

                  // 40% 이상 넘어가면 점진적으로 중력(경계 방향으로 끌림) 적용
                  // 더 부드럽게 증가하도록 세제곱 사용
                  if (maxEdgeRatio > 0.4) {
                    const gravityStrength = Math.pow((maxEdgeRatio - 0.4) / 0.6, 3) * 0.08; // 세제곱으로 매우 점진적 증가, 강도 감소

                    if (edgeRatio.left > 0.4) {
                      marble.vx -= gravityStrength * timeScale;
                    }
                    if (edgeRatio.right > 0.4) {
                      marble.vx += gravityStrength * timeScale;
                    }
                    if (edgeRatio.top > 0.4) {
                      marble.vy -= gravityStrength * timeScale;
                    }
                    if (edgeRatio.bottom > 0.4) {
                      marble.vy += gravityStrength * timeScale;
                    }
                  }

                  // 경계 근처에서 추가 마찰 적용 - 더 부드럽게
                  if (maxEdgeRatio > 0.5) {
                    const edgeFriction = 0.97 - (maxEdgeRatio - 0.5) * 0.08; // 0.95->0.97로 부드럽게, 감속도 완화
                    marble.vx *= edgeFriction ** timeScale;
                    marble.vy *= edgeFriction ** timeScale;
                  }
                };

                // 속도 기반 동적 마찰을 계산하는 함수
                const applyDynamicFriction = (marble) => {
                  const speed = Math.sqrt(marble.vx * marble.vx + marble.vy * marble.vy);

                  // 속도가 느릴수록 마찰이 강해짐 (나무판 효과)
                  // physicsConfig.friction을 기준으로 동적 마찰 계산
                  const baseFriction = physicsConfig.friction;
                  let dynamicFriction;

                  if (speed > 5) {
                    // 빠른 속도: 거의 마찰 없음
                    dynamicFriction = Math.min(0.99, baseFriction + 0.01);
                  } else if (speed > 2) {
                    // 중간 속도: 선형 보간
                    const t = (speed - 2) / 3; // 0 ~ 1
                    dynamicFriction = (baseFriction - 0.06) + t * 0.07;
                  } else if (speed > 0.5) {
                    // 느린 속도: 강한 마찰
                    const t = (speed - 0.5) / 1.5; // 0 ~ 1
                    dynamicFriction = (baseFriction - 0.10) + t * 0.04;
                  } else {
                    // 매우 느림: 매우 강한 마찰
                    dynamicFriction = baseFriction - 0.13;
                  }

                  marble.vx *= dynamicFriction ** timeScale;
                  marble.vy *= dynamicFriction ** timeScale;

                  // 매우 느린 속도는 완전히 멈춤
                  if (Math.abs(marble.vx) < 0.05) marble.vx = 0;
                  if (Math.abs(marble.vy) < 0.05) marble.vy = 0;
                };

                // 속도 업데이트 (동적 마찰 적용)
                applyDynamicFriction(newShooter);
                newMarbles.forEach(m => applyDynamicFriction(m));

                // 경계 물리 효과 적용
                applyEdgePhysics(newShooter);
                newMarbles.forEach(m => applyEdgePhysics(m));

                // 위치 업데이트
                newShooter.x += newShooter.vx * timeScale;
                newShooter.y += newShooter.vy * timeScale;
                newMarbles.forEach(m => {
                  m.x += m.vx * timeScale;
                  m.y += m.vy * timeScale;
                });

                // 스프링 충돌 체크 (개발자 모드)
                if (isDevMode && devStage.springs) {
                  devStage.springs.forEach(spring => {
                    const springPower = spring.power || 20;
                    const springSize  = spring.size  || 40;
                    const springAngle = spring.angle || 0;

                    const checkSpringCollision = (marble) => {
                      if (marble.x >= spring.x && marble.x <= spring.x + springSize &&
                          marble.y >= spring.y && marble.y <= spring.y + springSize) {
                        marble.vx = Math.cos(springAngle) * springPower;
                        marble.vy = Math.sin(springAngle) * springPower;
                        playSound('collision');
                      }
                    };

                    checkSpringCollision(newShooter);
                    newMarbles.forEach(checkSpringCollision);
                  });
                }

                newMarbles.forEach(marble => {
                  const dx = marble.x - newShooter.x;
                  const dy = marble.y - newShooter.y;
                  const distance = Math.sqrt(dx * dx + dy * dy);

                  if (distance < physicsConfig.puckRadius * 2 && distance > 0.01) { // distance > 0.01로 0 나누기 방지
                    playSound('collision'); createParticles(marble.x, marble.y, 'collision'); collisionPopRef.current['shooter'] = Date.now(); collisionPopRef.current[marble.id] = Date.now();

                    const angle = Math.atan2(dy, dx);
                    const sin = Math.sin(angle);
                    const cos = Math.cos(angle);

                    const v1n = newShooter.vx * cos + newShooter.vy * sin;
                    const v1t = newShooter.vy * cos - newShooter.vx * sin;
                    const v2n = marble.vx * cos + marble.vy * sin;
                    const v2t = marble.vy * cos - marble.vx * sin;

                    const m1 = newShooter.mass;
                    const m2 = marble.mass;
                    const v1n_final = (v1n * (m1 - m2) + 2 * m2 * v2n) / (m1 + m2);
                    const v2n_final = (v2n * (m2 - m1) + 2 * m1 * v1n) / (m1 + m2);

                    // 충돌 후 에너지 손실 적용 (더 부드러운 반응)
                    newShooter.vx = (v1n_final * cos - v1t * sin) * physicsConfig.collisionEnergyLoss;
                    newShooter.vy = (v1t * cos + v1n_final * sin) * physicsConfig.collisionEnergyLoss;
                    marble.vx = (v2n_final * cos - v2t * sin) * physicsConfig.collisionEnergyLoss;
                    marble.vy = (v2t * cos + v2n_final * sin) * physicsConfig.collisionEnergyLoss;

                    // 겹침 해소 - 더 강력하게
                    const overlap = physicsConfig.puckRadius * 2 - distance;
                    if (overlap > 0) {
                        const normalX = dx / distance;
                        const normalY = dy / distance;
                        const separation = overlap * 0.52; // 0.5 -> 0.52로 증가
                        newShooter.x -= normalX * separation;
                        newShooter.y -= normalY * separation;
                        marble.x += normalX * separation;
                        marble.y += normalY * separation;
                    }
                  }
                });

                // 구슬끼리 충돌 - 여러 번 반복하여 안정성 향상
                for (let iteration = 0; iteration < 3; iteration++) { // 3번 반복
                  for (let i = 0; i < newMarbles.length; i++) {
                    for (let j = i + 1; j < newMarbles.length; j++) {
                      const m1 = newMarbles[i];
                      const m2 = newMarbles[j];
                      const dx = m2.x - m1.x;
                      const dy = m2.y - m1.y;
                      const distance = Math.sqrt(dx * dx + dy * dy);

                      if (distance < physicsConfig.puckRadius * 2 && distance > 0.01) {
                        if (iteration === 0) { // 첫 반복에서만 사운드와 파티클
                          playSound('collision'); createParticles(m1.x + (dx/2), m1.y + (dy/2), 'collision'); collisionPopRef.current[m1.id] = Date.now(); collisionPopRef.current[m2.id] = Date.now();
                        }

                        if (iteration === 0) { // 첫 반복에서만 속도 계산
                          const angle = Math.atan2(dy, dx);
                          const sin = Math.sin(angle);
                          const cos = Math.cos(angle);

                          const v1n = m1.vx * cos + m1.vy * sin;
                          const v1t = m1.vy * cos - m1.vx * sin;
                          const v2n = m2.vx * cos + m2.vy * sin;
                          const v2t = m2.vy * cos - m2.vx * sin;

                          const mass1 = m1.mass;
                          const mass2 = m2.mass;

                          const v1n_final = (v1n * (mass1 - mass2) + 2 * mass2 * v2n) / (mass1 + mass2);
                          const v2n_final = (v2n * (mass2 - mass1) + 2 * mass1 * v1n) / (mass1 + mass2);

                          // 충돌 후 에너지 손실 적용
                          m1.vx = (v1n_final * cos - v1t * sin) * physicsConfig.collisionEnergyLoss;
                          m1.vy = (v1t * cos + v1n_final * sin) * physicsConfig.collisionEnergyLoss;
                          m2.vx = (v2n_final * cos - v2t * sin) * physicsConfig.collisionEnergyLoss;
                          m2.vy = (v2t * cos + v2n_final * sin) * physicsConfig.collisionEnergyLoss;
                        }

                        // 겹침 해소
                        const overlap = physicsConfig.puckRadius * 2 - distance;
                        if (overlap > 0) {
                            const normalX = dx / distance;
                            const normalY = dy / distance;
                            const separation = overlap * 0.52;
                            m1.x -= normalX * separation;
                            m1.y -= normalY * separation;
                            m2.x += normalX * separation;
                            m2.y += normalY * separation;
                        }
                      }
                    }
                  }
                }

                // 판 경계에서 떨어지는 로직에서 처리 (충돌과 다름)

                // ── 장애물 충돌 (type 별 처리) ──────────────────────────
                const allMarbles = [newShooter, ...newMarbles];
                const currentStageDataForObs = isDevMode ? devStage : stages.find(s => s.id === currentStage);

                // ── crunch 충돌 처리 (dynamicObstacles 기반) ──────────────
                const now = Date.now();
                const crunchToRemove = new Set();
                const crunchFragmentsToAdd = [];

                allMarbles.forEach(marble => {
                  dynamicObstacles.forEach(obstacle => {
                    if (obstacle.type !== 'crunch' || obstacle._fragment) return;
                    if (crunchToRemove.has(obstacle._id)) return;

                    const cr = obstacle.radius || 22;
                    const dx = marble.x - obstacle.x;
                    const dy = marble.y - obstacle.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const r = physicsConfig.puckRadius;

                    if (dist < cr + r && dist > 0.01) {
                      // 쿨다운 체크 (재충돌 방지)
                      const coolKey = obstacle._id;
                      if (crunchCooldownRef.current[coolKey] && now - crunchCooldownRef.current[coolKey] < 200) return;
                      crunchCooldownRef.current[coolKey] = now;

                      // 반동 — obstacle.restitution 커스텀 (기본 0.25 = 약한 반동)
                      const restitution = obstacle.restitution ?? 0.25;
                      const nx = dx / dist;
                      const ny = dy / dist;
                      const overlap = cr + r - dist;
                      marble.x += nx * overlap * 0.5;
                      marble.y += ny * overlap * 0.5;
                      const dot = marble.vx * nx + marble.vy * ny;
                      marble.vx = (marble.vx - 2 * dot * nx) * restitution;
                      marble.vy = (marble.vy - 2 * dot * ny) * restitution;

                      crunchToRemove.add(obstacle._id);
                      playSound('collision');

                      // 조각 수, 속도, TTL 커스텀
                      const fragCount = obstacle.fragCount ?? 4;
                      const fragSpeed = obstacle.fragSpeed ?? 2.5;
                      const fragTTL   = obstacle.fragTTL   ?? 1200;
                      for (let i = 0; i < fragCount; i++) {
                        const angle = (i / fragCount) * Math.PI * 2 + Math.PI / 4;
                        const speed = fragSpeed + Math.random() * 2.0;
                        crunchFragmentsToAdd.push({
                          type: 'crunch',
                          _fragment: true,
                          _id: `frag_${obstacle._id}_${i}_${now}`,
                          x: obstacle.x + Math.cos(angle) * (cr * 0.5),
                          y: obstacle.y + Math.sin(angle) * (cr * 0.5),
                          vx: Math.cos(angle) * speed,
                          vy: Math.sin(angle) * speed,
                          radius: (cr * 0.38),
                          _angle: angle,
                          _born: now,
                          _ttl: fragTTL,
                        });
                      }
                    }
                  });
                });

                // 조각 물리 업데이트 + 만료 제거
                let nextDynObs = dynamicObstacles
                  .filter(o => !crunchToRemove.has(o._id))
                  .map(o => {
                    if (!o._fragment) return o;
                    const age = now - o._born;
                    if (age > o._ttl) return null; // 만료
                    // 조각 이동 + 마찰
                    const nx = { ...o, x: o.x + (o.vx || 0), y: o.y + (o.vy || 0), vx: (o.vx || 0) * 0.92, vy: (o.vy || 0) * 0.92 };
                    return nx;
                  })
                  .filter(Boolean);

                // 조각과 공 충돌 (조각은 공을 살짝 밀어냄)
                allMarbles.forEach(marble => {
                  nextDynObs.forEach(obs => {
                    if (!obs._fragment) return;
                    const fr = obs.radius;
                    const dx = marble.x - obs.x;
                    const dy = marble.y - obs.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const r = physicsConfig.puckRadius;
                    if (dist < fr + r && dist > 0.01) {
                      const nx = dx / dist;
                      const ny = dy / dist;
                      const overlap = fr + r - dist;
                      marble.x += nx * overlap * 0.5;
                      marble.y += ny * overlap * 0.5;
                      marble.vx += nx * 0.5;
                      marble.vy += ny * 0.5;
                    }
                  });
                });

                if (crunchToRemove.size > 0 || crunchFragmentsToAdd.length > 0) {
                  setDynamicObstacles([...nextDynObs, ...crunchFragmentsToAdd]);
                } else if (nextDynObs.some(o => o._fragment)) {
                  // 조각 이동 업데이트
                  setDynamicObstacles(nextDynObs);
                }

                if (dynamicObstacles.length > 0) {
                  allMarbles.forEach(marble => {
                    dynamicObstacles.forEach(obstacle => {
                      if (obstacle.type === 'crunch') return; // crunch는 위에서 처리
                      const r = physicsConfig.puckRadius;

                      // ── type: 'wall' (막힌 벽, OBB 회전 지원) ──────────────────────
                      if (!obstacle.type || obstacle.type === 'wall') {
                        const angle = obstacle.angle || 0;
                        const hw = (obstacle.width || 80) / 2;
                        const hh = (obstacle.height || 16) / 2;
                        const cx = obstacle.x + hw;
                        const cy = obstacle.y + hh;
                        const cosA = Math.cos(-angle), sinA = Math.sin(-angle);
                        const lx = cosA * (marble.x - cx) - sinA * (marble.y - cy);
                        const ly = sinA * (marble.x - cx) + cosA * (marble.y - cy);
                        const clx = Math.max(-hw, Math.min(lx, hw));
                        const cly = Math.max(-hh, Math.min(ly, hh));
                        const dlx = lx - clx, dly = ly - cly;
                        const dist = Math.sqrt(dlx * dlx + dly * dly);

                        if (dist < r && dist > 0.001) {
                          playSound('collision');
                          const lnx = dlx / dist, lny = dly / dist;
                          const cosB = Math.cos(angle), sinB = Math.sin(angle);
                          const nx = cosB * lnx - sinB * lny;
                          const ny = sinB * lnx + cosB * lny;
                          const overlap = r - dist;
                          marble.x += nx * overlap * 1.02;
                          marble.y += ny * overlap * 1.02;
                          const restitution = obstacle.restitution !== undefined ? obstacle.restitution : physicsConfig.bounceDamping;
                          const dot = marble.vx * nx + marble.vy * ny;
                          marble.vx -= (1 + restitution) * dot * nx;
                          marble.vy -= (1 + restitution) * dot * ny;
                          marble.vx *= restitution;
                          marble.vy *= restitution;
                        }
                      }

                      // ── type: 'magnet' (자기장 인력 — 완전 커스텀) ────────
                      else if (obstacle.type === 'magnet') {
                        // level 프리셋 → 커스텀 파라미터로 폴백
                        const MAGNET_PRESETS = {
                          1: { radius: 85,  strength: 0.48 },
                          2: { radius: 125, strength: 0.72 },
                          3: { radius: 170, strength: 0.95 },
                        };
                        const preset = MAGNET_PRESETS[obstacle.level || 1];
                        const range    = obstacle.radius    ?? preset.radius;
                        const strength = obstacle.strength  ?? preset.strength;
                        const r = physicsConfig.puckRadius;

                        const dx = obstacle.x - marble.x;
                        const dy = obstacle.y - marble.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        const minDist = r * 1.5;
                        if (dist < range && dist > minDist) {
                          const falloff = 1 - (dist / range);
                          const force   = strength * falloff;
                          marble.vx += (dx / dist) * force;
                          marble.vy += (dx / dist) * force;

                          const maxSpeed = obstacle.maxSpeed ?? (8 + strength * 4);
                          const speed = Math.sqrt(marble.vx * marble.vx + marble.vy * marble.vy);
                          if (speed > maxSpeed) {
                            marble.vx = (marble.vx / speed) * maxSpeed;
                            marble.vy = (marble.vy / speed) * maxSpeed;
                          }
                        } else if (dist <= minDist && dist > 0.01) {
                          marble.vx -= (dx / dist) * 0.3;
                          marble.vy -= (dy / dist) * 0.3;
                        }
                      }

                      // ── type: 'floor' (얼음/모래 바닥) ───────────────────
                      else if (obstacle.type === 'floor') {
                        const dx = marble.x - obstacle.x;
                        const dy = marble.y - obstacle.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < (obstacle.radius || 50)) {
                          if (obstacle.subType === 'ice') {
                            // 마찰력 무시 (거의 안 멈춤)
                            marble.vx *= 1.01; 
                            marble.vy *= 1.01;
                          } else if (obstacle.subType === 'sand') {
                            // 급격한 감속
                            marble.vx *= 0.85;
                            marble.vy *= 0.85;
                          }
                        }
                      }

                      // ── type: 'portal' (순간이동) ────────────────────────
                      else if (obstacle.type === 'portal') {
                        const dx = marble.x - obstacle.x;
                        const dy = marble.y - obstacle.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 20 && !marble._portalCooldown) {
                          const target = dynamicObstacles.find(o => o.type === 'portal' && o._id !== obstacle._id && o.pairId === obstacle.pairId);
                          if (target) {
                            marble.x = target.x;
                            marble.y = target.y;
                            marble._portalCooldown = 30; // 30프레임 쿨다운
                            playSound('click');
                            createParticles(target.x, target.y, 'teleport');
                          }
                        }
                      }

                      // ── type: 'bomb' (폭발물) ───────────────────────────
                      else if (obstacle.type === 'bomb') {
                        const dx = marble.x - obstacle.x;
                        const dy = marble.y - obstacle.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < (obstacle.radius || 25) + r) {
                          // 즉시 폭발
                          const power = obstacle.power || 15;
                          const explosionRange = obstacle.explosionRange || 150;
                          
                          allMarbles.forEach(m => {
                            const edx = m.x - obstacle.x;
                            const edy = m.y - obstacle.y;
                            const edist = Math.sqrt(edx * edx + edy * edy);
                            if (edist < explosionRange) {
                              const force = (1 - edist / explosionRange) * power;
                              m.vx += (edx / edist) * force;
                              m.vy += (edy / edist) * force;
                            }
                          });
                          
                          playSound('collision'); // 폭발음 대용
                          createParticles(obstacle.x, obstacle.y, 'explosion');
                          crunchToRemove.add(obstacle._id); // 제거 (1회용)
                        }
                      }

                      // ── type: 'jump' (3차원 점프 패드) ────────────────────
                      else if (obstacle.type === 'jump') {
                        const dx = marble.x - obstacle.x;
                        const dy = marble.y - obstacle.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < (obstacle.radius || 30)) {
                          marble._jumpProgress = 0.01; // 점프 시작
                          playSound('click');
                        }
                      }

                      // ── type: 'button' (크기/질량 버튼) ───────────────────
                      else if (obstacle.type === 'button') {
                        const dx = marble.x - obstacle.x;
                        const dy = marble.y - obstacle.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < (obstacle.radius || 20) && !marble._buttonCooldown) {
                          if (obstacle.subType === 'grow') {
                            marble.mass = (marble.mass || 1) * 1.5;
                            marble._visualScale = (marble._visualScale || 1) * 1.2;
                          } else if (obstacle.subType === 'shrink') {
                            marble.mass = Math.max(0.5, (marble.mass || 1) * 0.7);
                            marble._visualScale = Math.max(0.6, (marble._visualScale || 1) * 0.8);
                          }
                          marble._buttonCooldown = 60;
                          playSound('click');
                        }
                      }
                    });
                  });
                }

                const marblesOnBoard = [];
                const marblesFalling = [];

                // 씽크홀 목록 미리 추출 (dynamicObstacles 기반)
                const sinkholes = dynamicObstacles.filter(o => o.type === 'sinkhole');

                newMarbles.forEach(m => {
                    // 씽크홀 진입 판정 우선 (경계 낙하보다 먼저)
                    const suckedBy = sinkholes.find(sh => {
                        const dx = m.x - sh.x;
                        const dy = m.y - sh.y;
                        const threshold = sh.threshold ?? 0.85; // 커스텀 흡입 시작 비율
                        return Math.sqrt(dx * dx + dy * dy) < sh.radius * threshold;
                    });
                    if (suckedBy) {
                        if (!fallSoundPlayedThisFrame) { playSound('fall'); fallSoundPlayedThisFrame = true; }
                        marblesFalling.push(createSinkholeFallingMarble(m, true, suckedBy, puckRadius));
                    } else if (shouldFall(m, puckRadius)) {
                        if (!fallSoundPlayedThisFrame) { playSound('fall'); fallSoundPlayedThisFrame = true; }
                        marblesFalling.push(createFallingMarble(m, true, puckRadius));
                    } else {
                        marblesOnBoard.push(m);
                    }
                });

                if (marblesFalling.length > 0) {
                    setFallingMarbles(prev => [...prev, ...marblesFalling]);
                }
                setMarbles(marblesOnBoard);

                // ── 그린 고무공 물리 처리 ──────────────────────────────────
                if (newGreenBalls.length > 0) {
                  // 마찰/경계 물리 적용
                  newGreenBalls.forEach(g => {
                    applyDynamicFriction(g);
                    applyEdgePhysics(g);
                    g.x += g.vx * timeScale;
                    g.y += g.vy * timeScale;
                  });

                  // 그린볼 ↔ 슈터 충돌 (탄성 계수 적용)
                  newGreenBalls.forEach(g => {
                    const dx = g.x - newShooter.x;
                    const dy = g.y - newShooter.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < puckRadius * 2 && dist > 0.01) {
                      playSound('collision');
                      collisionPopRef.current['shooter'] = Date.now();
                      collisionPopRef.current[g.id] = Date.now();
                      const angle = Math.atan2(dy, dx);
                      const sin = Math.sin(angle); const cos = Math.cos(angle);
                      const v1n = newShooter.vx * cos + newShooter.vy * sin;
                      const v1t = newShooter.vy * cos - newShooter.vx * sin;
                      const v2n = g.vx * cos + g.vy * sin;
                      const v2t = g.vy * cos - g.vx * sin;
                      const m1 = newShooter.mass; const m2 = g.mass || 1;
                      const v1n_f = (v1n * (m1 - m2) + 2 * m2 * v2n) / (m1 + m2);
                      const v2n_f = (v2n * (m2 - m1) + 2 * m1 * v1n) / (m1 + m2);
                      newShooter.vx = (v1n_f * cos - v1t * sin) * physicsConfig.collisionEnergyLoss;
                      newShooter.vy = (v1t * cos + v1n_f * sin) * physicsConfig.collisionEnergyLoss;
                      g.vx = (v2n_f * cos - v2t * sin) * GREEN_RESTITUTION;
                      g.vy = (v2t * cos + v2n_f * sin) * GREEN_RESTITUTION;
                      const overlap = puckRadius * 2 - dist;
                      if (overlap > 0) {
                        const nx = dx / dist; const ny = dy / dist;
                        newShooter.x -= nx * overlap * 0.52;
                        newShooter.y -= ny * overlap * 0.52;
                        g.x += nx * overlap * 0.52;
                        g.y += ny * overlap * 0.52;
                      }
                    }
                  });

                  // 그린볼 ↔ 레드 구슬 충돌
                  newGreenBalls.forEach(g => {
                    newMarbles.forEach(m => {
                      const dx = g.x - m.x;
                      const dy = g.y - m.y;
                      const dist = Math.sqrt(dx * dx + dy * dy);
                      if (dist < puckRadius * 2 && dist > 0.01) {
                        playSound('collision');
                        collisionPopRef.current[g.id] = Date.now();
                        collisionPopRef.current[m.id] = Date.now();
                        const angle = Math.atan2(dy, dx);
                        const sin = Math.sin(angle); const cos = Math.cos(angle);
                        const v1n = g.vx * cos + g.vy * sin;
                        const v1t = g.vy * cos - g.vx * sin;
                        const v2n = m.vx * cos + m.vy * sin;
                        const v2t = m.vy * cos - m.vx * sin;
                        const mg = g.mass || 1; const mr = m.mass || 1;
                        const v1n_f = (v1n * (mg - mr) + 2 * mr * v2n) / (mg + mr);
                        const v2n_f = (v2n * (mr - mg) + 2 * mg * v1n) / (mg + mr);
                        g.vx = (v1n_f * cos - v1t * sin) * GREEN_RESTITUTION;
                        g.vy = (v1t * cos + v1n_f * sin) * GREEN_RESTITUTION;
                        m.vx = (v2n_f * cos - v2t * sin) * physicsConfig.collisionEnergyLoss;
                        m.vy = (v2t * cos + v2n_f * sin) * physicsConfig.collisionEnergyLoss;
                        const overlap = puckRadius * 2 - dist;
                        if (overlap > 0) {
                          const nx = dx / dist; const ny = dy / dist;
                          g.x += nx * overlap * 0.52;
                          g.y += ny * overlap * 0.52;
                          m.x -= nx * overlap * 0.52;
                          m.y -= ny * overlap * 0.52;
                        }
                      }
                    });
                  });

                  // 그린볼 ↔ 그린볼 충돌
                  for (let i = 0; i < newGreenBalls.length; i++) {
                    for (let j = i + 1; j < newGreenBalls.length; j++) {
                      const g1 = newGreenBalls[i]; const g2 = newGreenBalls[j];
                      const dx = g2.x - g1.x; const dy = g2.y - g1.y;
                      const dist = Math.sqrt(dx * dx + dy * dy);
                      if (dist < puckRadius * 2 && dist > 0.01) {
                        playSound('collision');
                        const angle = Math.atan2(dy, dx);
                        const sin = Math.sin(angle); const cos = Math.cos(angle);
                        const v1n = g1.vx * cos + g1.vy * sin;
                        const v1t = g1.vy * cos - g1.vx * sin;
                        const v2n = g2.vx * cos + g2.vy * sin;
                        const v2t = g2.vy * cos - g2.vx * sin;
                        g1.vx = (v2n * cos - v1t * sin) * GREEN_RESTITUTION;
                        g1.vy = (v1t * cos + v2n * sin) * GREEN_RESTITUTION;
                        g2.vx = (v1n * cos - v2t * sin) * GREEN_RESTITUTION;
                        g2.vy = (v2t * cos + v1n * sin) * GREEN_RESTITUTION;
                        const overlap = puckRadius * 2 - dist;
                        if (overlap > 0) {
                          const nx = dx / dist; const ny = dy / dist;
                          g1.x -= nx * overlap * 0.52;
                          g1.y -= ny * overlap * 0.52;
                          g2.x += nx * overlap * 0.52;
                          g2.y += ny * overlap * 0.52;
                        }
                      }
                    }
                  }

                  // 그린볼 낙하 판정 (경계 벗어나면 제거)
                  setGreenBalls(newGreenBalls.filter(g => !shouldFall(g, puckRadius)));
                }
                // ──────────────────────────────────────────────────────────

                // 파란 구슬이 떨어지는 중이거나 이미 떨어졌으면 물리 업데이트 중단
                if (shooterFallingRef.current || hasFallenRef.current) {
                    // 떨어지는 중이거나 이미 떨어진 경우 아무것도 하지 않음
                } else {
                    // 파란 구슬 씽크홀/낙하 판정
                    const shooterSuckedBy = sinkholes.find(sh => {
                        const dx = newShooter.x - sh.x;
                        const dy = newShooter.y - sh.y;
                        const threshold = sh.threshold ?? 0.85;
                        return Math.sqrt(dx * dx + dy * dy) < sh.radius * threshold;
                    });
                    if (shooterSuckedBy) {
                        if (!fallSoundPlayedThisFrame) playSound('fall');
                        setShooterFalling(createSinkholeFallingMarble(newShooter, false, shooterSuckedBy, puckRadius));
                        hasFallenRef.current = true;
                    } else if (shouldFall(newShooter, puckRadius)) {
                        if (!fallSoundPlayedThisFrame) {
                            playSound('fall');
                        }
                        setShooterFalling(createFallingMarble(newShooter, false, puckRadius));
                        hasFallenRef.current = true; // 떨어졌다고 표시
                    } else {
                        // 떨어지지 않는 경우에만 위치 업데이트
                        setShooterMarble(newShooter);
                    }
                }

                if (shooterFallingRef.current || marblesFalling.length > 0) {
                    // Do nothing, wait for falling animation to complete
                } else {
                    const allStopped = Math.abs(newShooter.vx) < 0.1 && Math.abs(newShooter.vy) < 0.1 &&
                                     marblesOnBoard.every(m => Math.abs(m.vx) < 0.1 && Math.abs(m.vy) < 0.1) &&
                                     newGreenBalls.every(g => Math.abs(g.vx) < 0.1 && Math.abs(g.vy) < 0.1);
                    if (allStopped) {
                        if (marblesOnBoard.length === 0) {
                            const stage = stages.find(s => s.id === currentStage);
                            let stars = 0;
                            if (stage.starCriteria) {
                                if (shotsTaken <= stage.starCriteria[3]) stars = 3;
                                else if (shotsTaken <= stage.starCriteria[2]) stars = 2;
                                else if (shotsTaken <= stage.starCriteria[1]) stars = 1;
                            }
                            setLastStageStars(stars);
                            setGameState('complete');
                            if (score > highScore) { setHighScore(score); localStorage.setItem('highScore', score.toString()); }
                        } else {
                            if (attemptsLeft === Infinity) {
                                setGameState('ready');
                            } else if (attemptsLeft > 1) {
                                setAttemptsLeft(attemptsLeft - 1);
                                setGameState('ready');
                            } else {
                                setGameState('failed');
                                if (score > highScore) { setHighScore(score); localStorage.setItem('highScore', score.toString()); }
                            }
                        }
                    }
                }
              }
            };

            if (!animationRef.current) {
              animationRef.current = requestAnimationFrame(gameLoop);
            }

            return () => {
              if (animationRef.current) {
                cancelAnimationFrame(animationRef.current);
                animationRef.current = null;
              }
            };
          }, [gameState, isPaused, shooterMarble, marbles, attemptsLeft, greenBalls]);



          // 렌더 RAF 클로저가 항상 최신 state를 볼 수 있도록 ref에 동기화
          useEffect(() => {
            renderStateRef.current = {
              marbles, shooterMarble, gameState, aimEnd, fallingMarbles,
              shooterFalling, particles, currentStage, dynamicObstacles,
              devStage, isTestMode, selectedObject, isDevMode,
              physicsConfig, placementMode, greenBalls, language,
              showTrajectory, comboCount,
              redMarbleImgRef, redCollisionImgRef, blueMarbleImgRef, blueCollisionImgRef
            };
          });

          // 렌더링 최적화를 위한 requestAnimationFrame 기반 렌더링
          useEffect(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;

            let renderAnimationId;
            const render = () => {
              // 항상 최신 state 참조 (stale closure 방지)
              const {
                marbles, shooterMarble, gameState, aimEnd, fallingMarbles,
                shooterFalling, particles, dynamicObstacles,
                devStage, isTestMode, selectedObject, isDevMode,
                physicsConfig, greenBalls, language: renderLang,
                redMarbleImgRef, redCollisionImgRef, blueMarbleImgRef, blueCollisionImgRef
              } = renderStateRef.current;
              const TR = TEXTS[renderLang] || TEXTS['KR'];

              const ctx = canvas.getContext('2d');
              ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

              // 구슬 이미지 원형 클리핑 렌더 헬퍼
              const drawMarbleImg = (imgRef, cx, cy, r) => {
                const img = imgRef && imgRef.current;
                if (!img || !img.complete || img.naturalWidth === 0) return false;
                ctx.save();
                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, Math.PI * 2);
                ctx.clip();
                ctx.drawImage(img, cx - r, cy - r, r * 2, r * 2);
                ctx.restore();
                return true;
              };
              // 충돌 중인지 확인하는 헬퍼
              const isInCollision = (id) => {
                const t = collisionPopRef.current[id];
                return t && (Date.now() - t) < 150;
              };

              // 전체 테두리를 보이는 배경
              ctx.fillStyle = '#0a0806';
              ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

              // 보드 그림자 (입체감)
              ctx.save();
              ctx.shadowColor = 'rgba(0, 0, 0, 0.9)';
              ctx.shadowBlur = 40;
              ctx.shadowOffsetX = 0;
              ctx.shadowOffsetY = 15;

              // 나무 텍스처를 중앙에 그림
              if (woodTextureRef.current) {
                ctx.drawImage(woodTextureRef.current, BOARD_OFFSET, BOARD_OFFSET);
              }

              // ── 장애물 렌더링 ─────────────────────────────────────────
              // 편집 모드: devStage.obstacles 직접 참조 (dynamicObstacles는 테스트/플레이 전용)
              const renderObstacles = (isDevMode && !isTestMode)
                ? (devStage.obstacles || [])
                : dynamicObstacles.filter(o => o.type !== 'crunch');
              if (renderObstacles.length > 0) {
                renderObstacles.forEach(obstacle => {
                  const ox = obstacle.x + BOARD_OFFSET;
                  const oy = obstacle.y + BOARD_OFFSET;
                  const ow = obstacle.width;
                  const oh = obstacle.height;

                  if (!obstacle.type || obstacle.type === 'wall') {
                    // ── 막힌 벽: 브릭 패턴 (회전 지원) ─────────────────────────
                    ctx.save();
                    const wallAngle = obstacle.angle || 0;
                    const wcx = ox + ow / 2;
                    const wcy = oy + oh / 2;
                    ctx.translate(wcx, wcy);
                    ctx.rotate(wallAngle);
                    ctx.translate(-ow / 2, -oh / 2);
                    // 벽 본체
                    ctx.fillStyle = '#5c3a1e';
                    ctx.strokeStyle = '#3a2210';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.roundRect ? ctx.roundRect(0, 0, ow, oh, 3) : ctx.rect(0, 0, ow, oh);
                    ctx.fill();
                    ctx.stroke();

                    // 브릭 줄무늬 (가로 분할선)
                    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
                    ctx.lineWidth = 1;
                    const brickH = Math.max(8, oh / Math.max(1, Math.round(oh / 12)));
                    for (let by = brickH; by < oh - 2; by += brickH) {
                      ctx.beginPath(); ctx.moveTo(2, by); ctx.lineTo(ow - 2, by); ctx.stroke();
                    }
                    // 세로 분할선 (홀짝 행 엇갈림)
                    const brickW = Math.max(16, ow / Math.max(1, Math.round(ow / 18)));
                    let row = 0;
                    for (let by = 0; by < oh; by += brickH, row++) {
                      const offset = (row % 2 === 0) ? 0 : brickW / 2;
                      for (let bx = offset + brickW; bx < ow - 2; bx += brickW) {
                        const lineY1 = Math.max(1, by);
                        const lineY2 = Math.min(oh - 1, by + brickH);
                        ctx.beginPath(); ctx.moveTo(bx, lineY1); ctx.lineTo(bx, lineY2); ctx.stroke();
                      }
                    }
                    // 하이라이트 (위쪽 밝은 선)
                    ctx.strokeStyle = 'rgba(255,200,150,0.18)';
                    ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(3, 1); ctx.lineTo(ow - 3, 1); ctx.stroke();
                    ctx.restore();
                  }

                  else if (obstacle.type === 'sinkhole') {
                    // ── 씽크홀: 어두운 원형 구멍 ────────────────────
                    const cx = ox; // ox = obstacle.x + BOARD_OFFSET (여기선 ox=center x)
                    const cy = oy;
                    const r  = obstacle.radius;
                    // 씽크홀은 x,y가 중심 좌표
                    const scx = obstacle.x + BOARD_OFFSET;
                    const scy = obstacle.y + BOARD_OFFSET;

                    ctx.save();

                    // 바깥 경고 링 (위험 표시)
                    ctx.strokeStyle = 'rgba(180,30,30,0.45)';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([4, 4]);
                    ctx.beginPath();
                    ctx.arc(scx, scy, r + 4, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);

                    // 구멍 본체 (가장 어두운 원)
                    ctx.fillStyle = '#0a0305';
                    ctx.beginPath();
                    ctx.arc(scx, scy, r, 0, Math.PI * 2);
                    ctx.fill();

                    // 깊이감 동심원 3개
                    const rings = [
                      { ratio: 0.72, color: 'rgba(80,10,20,0.7)',  lw: 1.5 },
                      { ratio: 0.48, color: 'rgba(120,20,30,0.55)', lw: 1.2 },
                      { ratio: 0.24, color: 'rgba(160,30,40,0.4)',  lw: 1.0 },
                    ];
                    rings.forEach(({ ratio, color, lw }) => {
                      ctx.strokeStyle = color;
                      ctx.lineWidth = lw;
                      ctx.beginPath();
                      ctx.arc(scx, scy, r * ratio, 0, Math.PI * 2);
                      ctx.stroke();
                    });

                    // 느리게 회전하는 나선 (Date.now 기반 — 렌더 루프마다 호출되므로 자연스럽게 회전)
                    const t = Date.now() * 0.0006;
                    for (let i = 0; i < 3; i++) {
                      const angle = t + (i * Math.PI * 2 / 3);
                      const x1 = scx + Math.cos(angle) * r * 0.15;
                      const y1 = scy + Math.sin(angle) * r * 0.15;
                      const x2 = scx + Math.cos(angle + 0.6) * r * 0.55;
                      const y2 = scy + Math.sin(angle + 0.6) * r * 0.55;
                      ctx.strokeStyle = 'rgba(200,60,60,0.3)';
                      ctx.lineWidth = 1;
                      ctx.beginPath();
                      ctx.moveTo(x1, y1);
                      ctx.lineTo(x2, y2);
                      ctx.stroke();
                    }

                    // 외곽 테두리
                    ctx.strokeStyle = '#4a1018';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(scx, scy, r, 0, Math.PI * 2);
                    ctx.stroke();

                    ctx.restore();
                  }

                  else if (obstacle.type === 'magnet') {
                    // ... (기존 자석 렌더링 로직 유지)
                    const MAGNET_PRESETS = {
                      1: { radius: 85,  bodyR: 18, rings: 2, fill: '#1e3a8a', stroke: '#3b82f6', dotColor: '96,165,250',  dotCount: 6 },
                      2: { radius: 125, bodyR: 24, rings: 3, fill: '#1e1b4b', stroke: '#818cf8', dotColor: '165,180,252', dotCount: 8 },
                      3: { radius: 170, bodyR: 30, rings: 4, fill: '#0c0a1a', stroke: '#c4b5fd', dotColor: '196,181,253', dotCount: 12 },
                    };
                    const lv  = obstacle.level || 1;
                    const pre = MAGNET_PRESETS[lv];
                    const mRange   = obstacle.radius   ?? pre.radius;
                    const mBodyR   = obstacle.bodyRadius ?? pre.bodyR;
                    const mRings   = obstacle.rings    ?? pre.rings;
                    const mFill    = obstacle.fill     ?? pre.fill;
                    const mStroke  = obstacle.stroke   ?? pre.stroke;
                    const mDotCol  = obstacle.dotColor ?? pre.dotColor;
                    const mDotCnt  = obstacle.dotCount ?? pre.dotCount;
                    const mcx = obstacle.x + BOARD_OFFSET;
                    const mcy = obstacle.y + BOARD_OFFSET;

                    ctx.save();
                    const ringRatios = [0.95, 0.70, 0.46, 0.25];
                    const ringAlphas = [0.12, 0.22, 0.34, 0.48];
                    for (let ri = 0; ri < mRings; ri++) {
                      ctx.strokeStyle = `rgba(${mDotCol},${ringAlphas[ri]})`;
                      ctx.lineWidth = ri === mRings - 1 ? 1.5 : 1;
                      ctx.setLineDash(ri === 0 ? [4, 7] : [5, 8]);
                      ctx.beginPath(); ctx.arc(mcx, mcy, mRange * ringRatios[ri], 0, Math.PI * 2); ctx.stroke();
                    }
                    ctx.setLineDash([]);
                    const tp = (Date.now() * 0.0009) % 1;
                    for (let i = 0; i < mDotCnt; i++) {
                      const baseAngle = (i / mDotCnt) * Math.PI * 2;
                      const progress  = (tp + i / mDotCnt) % 1;
                      const dotDist   = mRange * 0.90 * (1 - progress);
                      const dotAlpha  = 0.80 * (1 - progress * progress);
                      ctx.fillStyle = `rgba(${mDotCol},${dotAlpha})`;
                      ctx.beginPath(); ctx.arc(mcx + Math.cos(baseAngle) * dotDist, mcy + Math.sin(baseAngle) * dotDist, 1.8 + lv * 0.6, 0, Math.PI * 2); ctx.fill();
                    }
                    ctx.fillStyle = mFill; ctx.strokeStyle = mStroke; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(mcx, mcy, mBodyR, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    const fs = Math.max(8, mBodyR * 0.60);
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = `bold ${fs}px Arial`;
                    ctx.fillStyle = '#bfdbfe'; ctx.fillText('N', mcx, mcy - mBodyR * 0.30);
                    ctx.fillStyle = '#fca5a5'; ctx.fillText('S', mcx, mcy + mBodyR * 0.36);
                    ctx.restore();
                  }

                  else if (obstacle.type === 'floor') {
                    const r = obstacle.radius || 50;
                    ctx.save();
                    ctx.globalAlpha = 0.4;
                    if (obstacle.subType === 'ice') {
                      const g = ctx.createRadialGradient(ox, oy, 0, ox, oy, r);
                      g.addColorStop(0, '#e0f2fe'); g.addColorStop(1, '#7dd3fc');
                      ctx.fillStyle = g;
                    } else {
                      const g = ctx.createRadialGradient(ox, oy, 0, ox, oy, r);
                      g.addColorStop(0, '#fef3c7'); g.addColorStop(1, '#f59e0b');
                      ctx.fillStyle = g;
                    }
                    ctx.beginPath(); ctx.arc(ox, oy, r, 0, Math.PI * 2); ctx.fill();
                    ctx.globalAlpha = 0.7; ctx.strokeStyle = '#fff'; ctx.setLineDash([5, 5]);
                    ctx.stroke(); ctx.restore();
                  }

                  else if (obstacle.type === 'portal') {
                    const r = 20;
                    const t = Date.now() * 0.005;
                    ctx.save();
                    const g = ctx.createRadialGradient(ox, oy, 0, ox, oy, r);
