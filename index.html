                    const col = obstacle.pairId % 2 === 0 ? ['#a855f7', '#3b82f6'] : ['#ec4899', '#f97316'];
                    g.addColorStop(0, '#fff'); g.addColorStop(0.3, col[0]); g.addColorStop(1, col[1]);
                    ctx.fillStyle = g; ctx.shadowColor = col[0]; ctx.shadowBlur = 15;
                    ctx.beginPath(); ctx.arc(ox, oy, r, 0, Math.PI * 2); ctx.fill();
                    ctx.rotate(t); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.setLineDash([4, 4]);
                    ctx.beginPath(); ctx.arc(ox, oy, r + 5, 0, Math.PI * 2); ctx.stroke();
                    ctx.restore();
                  }

                  else if (obstacle.type === 'bomb') {
                    const r = obstacle.radius || 25;
                    ctx.save();
                    ctx.fillStyle = '#1c1917'; ctx.beginPath(); ctx.arc(ox, oy, r, 0, Math.PI * 2); ctx.fill();
                    ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(ox, oy, r, 0, Math.PI * 2); ctx.stroke();
                    ctx.fillStyle = '#ef4444'; ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center';
                    ctx.fillText('BOMB', ox, oy + 5); ctx.restore();
                  }

                  else if (obstacle.type === 'jump') {
                    const r = 30;
                    ctx.save();
                    ctx.fillStyle = '#fbbf24'; ctx.beginPath(); ctx.arc(ox, oy, r, 0, Math.PI * 2); ctx.fill();
                    ctx.strokeStyle = '#b45309'; ctx.lineWidth = 2; ctx.stroke();
                    ctx.fillStyle = '#b45309'; ctx.font = '24px Arial'; ctx.textAlign = 'center';
                    ctx.fillText('▲', ox, oy + 8); ctx.restore();
                  }

                  else if (obstacle.type === 'button') {
                    const r = 20;
                    ctx.save();
                    ctx.fillStyle = obstacle.subType === 'grow' ? '#10b981' : '#f43f5e';
                    ctx.beginPath(); ctx.arc(ox, oy, r, 0, Math.PI * 2); ctx.fill();
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
                    ctx.fillStyle = '#fff'; ctx.font = 'bold 18px Arial'; ctx.textAlign = 'center';
                    ctx.fillText(obstacle.subType === 'grow' ? '+' : '-', ox, oy + 6);
                    ctx.restore();
                  }
                });
              }

              // ── crunch 렌더링 (dynamicObstacles) ──────────────────────
              const renderNow = Date.now();
              const renderCrunches = (isDevMode && !isTestMode)
                ? (devStage.obstacles || []).filter(o => o.type === 'crunch')
                : dynamicObstacles.filter(o => o.type === 'crunch');
              renderCrunches.forEach(obs => {
                const cx = obs.x + BOARD_OFFSET;
                const cy = obs.y + BOARD_OFFSET;
                const cr = obs.radius || 22;
                ctx.save();

                if (!obs._fragment) {
                  // 외곽 그림자
                  ctx.shadowColor = 'rgba(0,0,0,0.5)';
                  ctx.shadowBlur = 6;

                  // 본체 원
                  const grad = ctx.createRadialGradient(cx - cr * 0.3, cy - cr * 0.3, cr * 0.1, cx, cy, cr);
                  grad.addColorStop(0, '#b0a090');
                  grad.addColorStop(0.5, '#7a6a5a');
                  grad.addColorStop(1, '#4a3a2a');
                  ctx.fillStyle = grad;
                  ctx.beginPath();
                  ctx.arc(cx, cy, cr, 0, Math.PI * 2);
                  ctx.fill();
                  ctx.shadowBlur = 0;

                  // 균열선 (4방향)
                  ctx.strokeStyle = 'rgba(0,0,0,0.6)';
                  ctx.lineWidth = 1.5;
                  for (let i = 0; i < 4; i++) {
                    const a = (i / 4) * Math.PI * 2 + Math.PI / 4;
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.lineTo(cx + Math.cos(a) * cr * 0.85, cy + Math.sin(a) * cr * 0.85);
                    ctx.stroke();
                  }
                  // 테두리
                  ctx.strokeStyle = '#2a1a0a';
                  ctx.lineWidth = 2;
                  ctx.beginPath();
                  ctx.arc(cx, cy, cr, 0, Math.PI * 2);
                  ctx.stroke();

                  // X 아이콘 힌트
                  ctx.fillStyle = 'rgba(255,220,180,0.8)';
                  ctx.font = `bold ${Math.round(cr * 0.7)}px Arial`;
                  ctx.textAlign = 'center';
                  ctx.textBaseline = 'middle';
                  ctx.fillText('✕', cx, cy + 1);
                  ctx.textAlign = 'left';
                  ctx.textBaseline = 'alphabetic';

                } else {
                  // 조각 — 삼각형 형태, 페이드아웃
                  const age = renderNow - obs._born;
                  const life = Math.max(0, 1 - age / obs._ttl);
                  ctx.globalAlpha = life;
                  ctx.translate(cx, cy);
                  ctx.rotate(obs._angle + age * 0.004);

                  const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, cr);
                  grad.addColorStop(0, '#c0a880');
                  grad.addColorStop(1, '#5a3a1a');
                  ctx.fillStyle = grad;
                  ctx.strokeStyle = '#2a1a0a';
                  ctx.lineWidth = 1;

                  // 삼각형 조각
                  ctx.beginPath();
                  ctx.moveTo(0, -cr);
                  ctx.lineTo(cr * 0.8, cr * 0.5);
                  ctx.lineTo(-cr * 0.8, cr * 0.5);
                  ctx.closePath();
                  ctx.fill();
                  ctx.stroke();
                }
                ctx.restore();
              });

              // 스프링 그리기
              if (isDevMode && devStage.springs) {
                devStage.springs.forEach((spring, index) => {
                  const x = spring.x + BOARD_OFFSET;
                  const y = spring.y + BOARD_OFFSET;
                  const size = spring.size || 40;
                  const isSelected = selectedObject && selectedObject.type === 'spring' && selectedObject.index === index;

                  if (isSelected) {
                    ctx.strokeStyle = '#fbbf24';
                    ctx.lineWidth = 4;
                    ctx.setLineDash([8, 4]);
                    ctx.strokeRect(x - 4, y - 4, size + 8, size + 8);
                    ctx.setLineDash([]);
                  }

                  ctx.fillStyle = '#4ade80';
                  ctx.strokeStyle = isSelected ? '#fbbf24' : '#22c55e';
                  ctx.lineWidth = 3;
                  ctx.fillRect(x, y, size, size);
                  ctx.strokeRect(x, y, size, size);

                  const arrowColor = '#166534';
                  ctx.fillStyle = arrowColor;
                  ctx.strokeStyle = arrowColor;
                  ctx.lineWidth = 2;

                  const centerX = x + size / 2;
                  const centerY = y + size / 2;
                  const angle = spring.angle || 0;
                  const arrowLength = size * 0.6;

                  ctx.save();
                  ctx.translate(centerX, centerY);
                  ctx.rotate(angle);

                  ctx.beginPath();
                  ctx.moveTo(-arrowLength/2, 0);
                  ctx.lineTo(arrowLength/2, 0);
                  ctx.stroke();

                  ctx.beginPath();
                  ctx.moveTo(arrowLength/2, 0);
                  ctx.lineTo(arrowLength/2 - 8, -6);
                  ctx.lineTo(arrowLength/2 - 8, 6);
                  ctx.closePath();
                  ctx.fill();

                  ctx.restore();

                  if (isSelected) {
                    ctx.fillStyle = '#3b82f6';
                    ctx.strokeStyle = '#1d4ed8';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(x - 15, y + size/2, 12, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 10px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('↶', x - 15, y + size/2);

                    ctx.fillStyle = '#3b82f6';
                    ctx.strokeStyle = '#1d4ed8';
                    ctx.beginPath();
                    ctx.arc(x + size + 15, y + size/2, 12, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText('↷', x + size + 15, y + size/2);

                    ctx.textAlign = 'left';
                    ctx.textBaseline = 'alphabetic';
                  }
                });
              }



              // ── 편집 모드 선택 하이라이트 ────────────────────────────
              if (isDevMode && !isTestMode && selectedObject) {
                const t = Date.now() * 0.004;
                const pulse = 0.5 + 0.5 * Math.sin(t); // 0~1 맥동
                ctx.save();

                if (selectedObject.type === 'shooter') {
                  const x = shooterMarble.x + BOARD_OFFSET;
                  const y = shooterMarble.y + BOARD_OFFSET;
                  const r = physicsConfig.puckRadius;
                  ctx.strokeStyle = `rgba(251,191,36,${0.6 + pulse * 0.4})`;
                  ctx.lineWidth = 3;
                  ctx.setLineDash([6, 4]);
                  ctx.beginPath();
                  ctx.arc(x, y, r + 8 + pulse * 4, 0, Math.PI * 2);
                  ctx.stroke();
                  ctx.setLineDash([]);
                  ctx.fillStyle = 'rgba(251,191,36,0.15)';
                  ctx.beginPath();
                  ctx.arc(x, y, r + 8 + pulse * 4, 0, Math.PI * 2);
                  ctx.fill();
                  // 라벨
                  ctx.fillStyle = '#fbbf24';
                  ctx.font = 'bold 11px Arial';
                  ctx.textAlign = 'center';
                  ctx.fillText('SHOOTER', x, y - r - 14);
                  ctx.textAlign = 'left';
                }

                if (selectedObject.type === 'marble' && devStage.marbles[selectedObject.index]) {
                  const m = devStage.marbles[selectedObject.index];
                  const x = m.x + BOARD_OFFSET;
                  const y = m.y + BOARD_OFFSET;
                  const r = physicsConfig.puckRadius;
                  ctx.strokeStyle = `rgba(251,191,36,${0.6 + pulse * 0.4})`;
                  ctx.lineWidth = 3;
                  ctx.setLineDash([6, 4]);
                  ctx.beginPath();
                  ctx.arc(x, y, r + 8 + pulse * 4, 0, Math.PI * 2);
                  ctx.stroke();
                  ctx.setLineDash([]);
                  ctx.fillStyle = 'rgba(251,191,36,0.15)';
                  ctx.beginPath();
                  ctx.arc(x, y, r + 8 + pulse * 4, 0, Math.PI * 2);
                  ctx.fill();
                  ctx.fillStyle = '#fbbf24';
                  ctx.font = 'bold 11px Arial';
                  ctx.textAlign = 'center';
                  ctx.fillText(`#${selectedObject.index + 1}`, x, y - r - 14);
                  ctx.textAlign = 'left';
                }

                if (selectedObject.type === 'obstacle' && devStage.obstacles?.[selectedObject.index]) {
                  const obs = devStage.obstacles[selectedObject.index];
                  const ox = obs.x + BOARD_OFFSET;
                  const oy = obs.y + BOARD_OFFSET;
                  const pad = 10 + pulse * 4;
                  const typeColors = { wall:'255,200,0', sinkhole:'200,100,255', magnet:'100,180,255', crunch:'255,160,50' };
                  const col = typeColors[obs.type] || '251,191,36';
                  ctx.strokeStyle = `rgba(${col},${0.7 + pulse * 0.3})`;
                  ctx.lineWidth = 2.5;
                  ctx.setLineDash([6, 4]);

                  if (!obs.type || obs.type === 'wall') {
                    const hlAngle = obs.angle || 0;
                    const hlW = obs.width + pad * 2, hlH = obs.height + pad * 2;
                    const hlCx = ox + obs.width / 2, hlCy = oy + obs.height / 2;
                    ctx.save();
                    ctx.translate(hlCx, hlCy);
                    ctx.rotate(hlAngle);
                    ctx.strokeRect(-hlW/2, -hlH/2, hlW, hlH);
                    ctx.fillStyle = `rgba(${col},0.1)`;
                    ctx.fillRect(-hlW/2, -hlH/2, hlW, hlH);
                    ctx.restore();
                  } else {
                    const r = obs.radius || 28;
                    ctx.beginPath();
                    ctx.arc(ox, oy, r + pad, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.fillStyle = `rgba(${col},0.1)`;
                    ctx.beginPath();
                    ctx.arc(ox, oy, r + pad, 0, Math.PI * 2);
                    ctx.fill();
                  }
                  ctx.setLineDash([]);

                  // 오브젝트 타입 라벨
                  const labels = { wall:'🧱 WALL', sinkhole:'🕳️ SINKHOLE', magnet:'🧲 MAGNET', crunch:'💥 CRUNCH' };
                  ctx.fillStyle = `rgba(${col},1)`;
                  ctx.font = 'bold 11px Arial';
                  ctx.textAlign = 'center';
                  const labelY = obs.type === 'wall' ? oy + obs.height/2 - (obs.height/2 + pad + 6) : oy - (obs.radius || 28) - pad - 6;
                  ctx.fillText(labels[obs.type] || obs.type, ox + (obs.width||0)/2, labelY);
                  ctx.textAlign = 'left';
                }

                ctx.restore();
              }

              ctx.restore();

              // 조준선 렌더링 (스테이지 1-9에서 보드 끝까지)
              if ((aimEnd && gameState === 'aiming') || (showTrajectory && gameState === 'ready')) {
                let startX = shooterMarble.x;
                let startY = shooterMarble.y;
                let dirX, dirY;

                if (aimEnd && gameState === 'aiming') {
                  const aimX = aimEnd.x - BOARD_OFFSET;
                  const aimY = aimEnd.y - BOARD_OFFSET;
                  const dx = startX - aimX;
                  const dy = startY - aimY;
                  const angle = Math.atan2(dy, dx);
                  dirX = Math.cos(angle);
                  dirY = Math.sin(angle);
                } else {
                  // 힌트 모드: 가장 가까운 빨간 공 방향으로 가이드라인 표시
                  if (marbles.length > 0) {
                    const nearest = marbles.reduce((prev, curr) => {
                      const distPrev = Math.sqrt((prev.x - startX)**2 + (prev.y - startY)**2);
                      const distCurr = Math.sqrt((curr.x - startX)**2 + (curr.y - startY)**2);
                      return distPrev < distCurr ? prev : curr;
                    });
                    const angle = Math.atan2(nearest.y - startY, nearest.x - startX);
                    dirX = Math.cos(angle);
                    dirY = Math.sin(angle);
                  } else {
                    dirX = 0; dirY = -1;
                  }
                }

                // 판 경계까지 연장
                let maxDistance = 1000;
                if (dirX < 0) maxDistance = Math.min(maxDistance, -startX / dirX);
                if (dirX > 0) maxDistance = Math.min(maxDistance, (BOARD_SIZE - startX) / dirX);
                if (dirY < 0) maxDistance = Math.min(maxDistance, -startY / dirY);
                if (dirY > 0) maxDistance = Math.min(maxDistance, (BOARD_SIZE - startY) / dirY);

                const endX = startX + dirX * maxDistance;
                const endY = startY + dirY * maxDistance;

                // 점선으로 표시
                ctx.strokeStyle = showTrajectory ? 'rgba(255, 255, 0, 0.5)' : 'rgba(255, 255, 255, 0.6)';
                ctx.lineWidth = showTrajectory ? 3 : 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(startX + BOARD_OFFSET, startY + BOARD_OFFSET);
                ctx.lineTo(endX + BOARD_OFFSET, endY + BOARD_OFFSET);
                ctx.stroke();
                ctx.setLineDash([]);
              }

              // 파워 인디케이터
              if (gameState === 'aiming' && aimEnd) {
                const aimX = aimEnd.x - BOARD_OFFSET;
                const aimY = aimEnd.y - BOARD_OFFSET;
                const dx = shooterMarble.x - aimX;
                const dy = shooterMarble.y - aimY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const angle = Math.atan2(dy, dx);

                const power = Math.min(distance / 10, 16.5); // 10% 증가: 15 -> 16.5
                const powerPercentage = Math.round((power / 16.5) * 100);

                // 파워에 따른 화살표 색상 결정 (4단계)
                let arrowColor;
                if (powerPercentage < 25) {
                  arrowColor = '#22c55e'; // 그린
                } else if (powerPercentage < 50) {
                  arrowColor = '#eab308'; // 옐로우
                } else if (powerPercentage < 75) {
                  arrowColor = '#f97316'; // 오렌지
                } else {
                  arrowColor = '#ef4444'; // 레드
                }

                const arrowLength = Math.min(distance, 150);
                const endX = shooterMarble.x + Math.cos(angle) * arrowLength;
                const endY = shooterMarble.y + Math.sin(angle) * arrowLength;

                // 화살표 몸통 그리기
                ctx.strokeStyle = arrowColor;
                ctx.lineWidth = 4 + (power / 16.5) * 6; // 더 굵게
                ctx.beginPath();
                ctx.moveTo(shooterMarble.x + BOARD_OFFSET, shooterMarble.y + BOARD_OFFSET);
                ctx.lineTo(endX + BOARD_OFFSET, endY + BOARD_OFFSET);
                ctx.stroke();

                // 더 크고 날카로운 화살촉
                const arrowSize = 20 + (power / 16.5) * 10; // 크기 2배 증가
                const arrowAngle = Math.PI / 5; // 더 날카롭게 (30도 -> 36도)

                ctx.fillStyle = arrowColor;
                ctx.strokeStyle = arrowColor;
                ctx.lineWidth = 2;

                ctx.beginPath();
                ctx.moveTo(endX + BOARD_OFFSET, endY + BOARD_OFFSET);
                ctx.lineTo(
                  endX + BOARD_OFFSET - arrowSize * Math.cos(angle - arrowAngle),
                  endY + BOARD_OFFSET - arrowSize * Math.sin(angle - arrowAngle)
                );
                ctx.lineTo(
                  endX + BOARD_OFFSET - arrowSize * Math.cos(angle + arrowAngle),
                  endY + BOARD_OFFSET - arrowSize * Math.sin(angle + arrowAngle)
                );
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // 파워 텍스트
                ctx.fillStyle = arrowColor;
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 3;
                ctx.font = 'bold 18px sans-serif';
                const powerText = TR.powerText(powerPercentage);
                ctx.strokeText(powerText, endX + BOARD_OFFSET + 15, endY + BOARD_OFFSET);
                ctx.fillText(powerText, endX + BOARD_OFFSET + 15, endY + BOARD_OFFSET);
              }

              // 떨어지는 빨간 구슬 렌더링
              fallingMarbles.forEach(fm => {
                const progress = fm.fallProgress;

                const fmImgRef = fm.isRed ? redMarbleImgRef : blueMarbleImgRef;
                if (fm.fallType === 'sinkhole') {
                  const eased = progress * progress;
                  const pullX = fm.pushDirectionX * fm.pullDistance * eased;
                  const pullY = fm.pushDirectionY * fm.pullDistance * eased;
                  const currentSize = fm.startSize * (1 - eased);
                  const alpha = 1 - eased * eased;
                  if (currentSize <= 0.5) return;
                  ctx.save();
                  ctx.globalAlpha = alpha;
                  const fcx = fm.startX + BOARD_OFFSET + pullX;
                  const fcy = fm.startY + BOARD_OFFSET + pullY;
                  const drawn = drawMarbleImg(fmImgRef, fcx, fcy, currentSize);
                  if (!drawn) {
                    ctx.fillStyle = fm.isRed ? '#ef4444' : '#3b82f6';
                    ctx.beginPath();
                    ctx.arc(fcx, fcy, currentSize, 0, Math.PI * 2);
                    ctx.fill();
                  }
                  ctx.restore();

                } else {
                  const pushPhase = Math.min(progress / 0.6, 1);
                  const fadePhase = Math.max((progress - 0.6) / 0.4, 0);
                  const easedPush = 1 - Math.pow(1 - pushPhase, 3);
                  const offsetX = fm.pushDirectionX * EDGE_PUSH_DISTANCE * easedPush;
                  const offsetY = fm.pushDirectionY * EDGE_PUSH_DISTANCE * easedPush;
                  const currentSize = fm.startSize * (1 - fadePhase * 0.9);
                  const alpha = 1 - (fadePhase * fadePhase);
                  const fcx2 = fm.startX + BOARD_OFFSET + offsetX;
                  const fcy2 = fm.startY + BOARD_OFFSET + offsetY;

                  ctx.save();
                  ctx.globalAlpha = alpha;
                  ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
                  ctx.shadowBlur = fadePhase * 15;
                  const drawn2 = drawMarbleImg(fmImgRef, fcx2, fcy2, currentSize);
                  if (!drawn2) {
                    ctx.fillStyle = fm.isRed ? '#ef4444' : '#3b82f6';
                    ctx.beginPath();
                    ctx.arc(fcx2, fcy2, currentSize, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = fm.isRed ? '#7f1d1d' : '#1e40af';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                  }
                  ctx.restore();
                }
              });

              // 떨어지는 파란 구슬 렌더링
              if (shooterFalling) {
                const progress = shooterFalling.fallProgress;

                if (shooterFalling.fallType === 'sinkhole') {
                  // ── 씽크홀 흡입 (제자리에서 줄어들며 빨려들어감) ──
                  const eased = progress * progress;
                  const pullX = shooterFalling.pushDirectionX * shooterFalling.pullDistance * eased;
                  const pullY = shooterFalling.pushDirectionY * shooterFalling.pullDistance * eased;
                  const currentSize = shooterFalling.startSize * (1 - eased);
                  const alpha = 1 - eased * eased;
                  if (currentSize > 0.5) {
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    const sfcx = shooterFalling.startX + BOARD_OFFSET + pullX;
                    const sfcy = shooterFalling.startY + BOARD_OFFSET + pullY;
                    const sfDrawn = drawMarbleImg(blueMarbleImgRef, sfcx, sfcy, currentSize);
                    if (!sfDrawn) {
                      ctx.fillStyle = '#3b82f6';
                      ctx.beginPath();
                      ctx.arc(sfcx, sfcy, currentSize, 0, Math.PI * 2);
                      ctx.fill();
                      ctx.strokeStyle = '#1e40af';
                      ctx.lineWidth = 1.5;
                      ctx.stroke();
                    }
                    ctx.restore();
                  }
                } else {
                  const pushPhase = Math.min(progress / 0.6, 1);
                  const fadePhase = Math.max((progress - 0.6) / 0.4, 0);
                  const easedPush = 1 - Math.pow(1 - pushPhase, 3);
                  const offsetX = shooterFalling.pushDirectionX * EDGE_PUSH_DISTANCE * easedPush;
                  const offsetY = shooterFalling.pushDirectionY * EDGE_PUSH_DISTANCE * easedPush;
                  const currentSize = shooterFalling.startSize * (1 - fadePhase * 0.9);
                  const alpha = 1 - (fadePhase * fadePhase);
                  const sfcx2 = shooterFalling.startX + BOARD_OFFSET + offsetX;
                  const sfcy2 = shooterFalling.startY + BOARD_OFFSET + offsetY;

                  ctx.save();
                  ctx.globalAlpha = alpha;
                  ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
                  ctx.shadowBlur = fadePhase * 15;
                  const sfDrawn2 = drawMarbleImg(blueMarbleImgRef, sfcx2, sfcy2, currentSize);
                  if (!sfDrawn2) {
                    ctx.fillStyle = '#3b82f6';
                    ctx.beginPath();
                    ctx.arc(sfcx2, sfcy2, currentSize, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#1e40af';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                  }
                  ctx.restore();
                }
              }

              // 빨간 구슬 렌더링 (편집 모드: devStage 직접 참조)
              const renderMarbles = (isDevMode && !isTestMode) ? (devStage.marbles || []) : marbles;
              renderMarbles.forEach(marble => {
                ctx.save();
                let scaleFactor = 1;
                const collisionTime = collisionPopRef.current[marble.id];
                const inCollision = collisionTime && (Date.now() - collisionTime) < 150;
                if (collisionTime) {
                  const elapsed = Date.now() - collisionTime;
                  const duration = 150;
                  if (elapsed < duration) {
                    scaleFactor = 1 + 0.2 * (1 - elapsed / duration);
                  } else {
                    delete collisionPopRef.current[marble.id];
                  }
                }
                const cx = marble.x + BOARD_OFFSET;
                const cy = marble.y + BOARD_OFFSET;
                const r = physicsConfig.puckRadius;
                ctx.translate(cx, cy);
                ctx.scale(scaleFactor, scaleFactor);
                // 커스텀 이미지 우선, 없으면 기본 색상
                const redImg = inCollision ? redCollisionImgRef : redMarbleImgRef;
                const drawnImg = drawMarbleImg(redImg, 0, 0, r);
                if (!drawnImg) {
                  ctx.fillStyle = '#ef4444';
                  ctx.beginPath();
                  ctx.arc(0, 0, r, 0, Math.PI * 2);
                  ctx.fill();
                  ctx.strokeStyle = '#b91c1c';
                  ctx.lineWidth = 2;
                  ctx.stroke();
                }
                ctx.restore();
              });

              // 그린 고무공 렌더링 (편집 모드: devStage 직접, 테스트/플레이: greenBalls state)
              const renderGreenBalls = (isDevMode && !isTestMode)
                ? (devStage.greenBalls || [])
                : (greenBalls || []);
              if (renderGreenBalls.length > 0) {
                renderGreenBalls.forEach(g => {
                  ctx.save();
                  let scaleFactor = 1;
                  const collisionTime = collisionPopRef.current[g.id];
                  if (collisionTime) {
                    const elapsed = Date.now() - collisionTime;
                    if (elapsed < 150) { scaleFactor = 1 + 0.25 * (1 - elapsed / 150); }
                    else { delete collisionPopRef.current[g.id]; }
                  }
                  ctx.translate(g.x + BOARD_OFFSET, g.y + BOARD_OFFSET);
                  ctx.scale(scaleFactor, scaleFactor);
                  // 고무공 느낌: 진한 녹색 + 반짝이는 하이라이트
                  const grad = ctx.createRadialGradient(-physicsConfig.puckRadius * 0.3, -physicsConfig.puckRadius * 0.3, 1, 0, 0, physicsConfig.puckRadius);
                  grad.addColorStop(0, '#86efac');
                  grad.addColorStop(0.5, '#22c55e');
                  grad.addColorStop(1, '#15803d');
                  ctx.fillStyle = grad;
                  ctx.beginPath();
                  ctx.arc(0, 0, physicsConfig.puckRadius, 0, Math.PI * 2);
                  ctx.fill();
                  ctx.strokeStyle = '#166534';
                  ctx.lineWidth = 2;
                  ctx.stroke();
                  ctx.restore();
                });
              }

              // 편집 모드에서 greenBall 선택 하이라이트
              if (isDevMode && !isTestMode && selectedObject && selectedObject.type === 'greenBall' && (devStage.greenBalls||[])[selectedObject.index]) {
                const gb = devStage.greenBalls[selectedObject.index];
                ctx.save();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 3;
                ctx.setLineDash([4, 4]);
                ctx.beginPath();
                ctx.arc(gb.x + BOARD_OFFSET, gb.y + BOARD_OFFSET, physicsConfig.puckRadius + 5, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.restore();
              }

              // 파란 구슬 렌더링 - 떨어지지 않았을 때만
              if (!shooterFalling && !hasFallenRef.current) {
                ctx.save();
                let scaleFactor = 1;
                const collisionTime = collisionPopRef.current['shooter'];
                const inCollisionS = collisionTime && (Date.now() - collisionTime) < 150;
                if (collisionTime) {
                  const elapsed = Date.now() - collisionTime;
                  const duration = 150;
                  if (elapsed < duration) {
                    scaleFactor = 1 + 0.2 * (1 - elapsed / duration);
                  } else {
                    delete collisionPopRef.current['shooter'];
                  }
                }
                const bcx = shooterMarble.x + BOARD_OFFSET;
                const bcy = shooterMarble.y + BOARD_OFFSET;
                const br = physicsConfig.puckRadius;
                ctx.translate(bcx, bcy);
                ctx.scale(scaleFactor, scaleFactor);
                const blueImg = inCollisionS ? blueCollisionImgRef : blueMarbleImgRef;
                const drawnBlue = drawMarbleImg(blueImg, 0, 0, br);
                if (!drawnBlue) {
                  ctx.fillStyle = '#3b82f6';
                  ctx.beginPath();
                  ctx.arc(0, 0, br, 0, Math.PI * 2);
                  ctx.fill();
                  ctx.strokeStyle = '#1e40af';
                  ctx.lineWidth = 2;
                  ctx.stroke();
                }
                ctx.restore();
              }

              // 파티클 렌더링
              particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.arc(p.x + BOARD_OFFSET, p.y + BOARD_OFFSET, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
              });

              renderAnimationId = requestAnimationFrame(render);
            };

            renderAnimationId = requestAnimationFrame(render);

            return () => {
              if (renderAnimationId) {
                cancelAnimationFrame(renderAnimationId);
              }
            };
          }, []); // RAF 루프는 한 번만 시작, 값은 renderStateRef에서 항상 최신 참조

          const getEventCoordinates = (e, canvas) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            // Pointer 이벤트는 clientX, clientY를 직접 제공
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            return { x, y };
          };

          const handlePointerDown = (e) => {
            if (gameState !== 'ready' && !(isDevMode && !isTestMode)) return;

            const canvas = canvasRef.current;
            const { x, y } = getEventCoordinates(e, canvas);
            const boardX = x - BOARD_OFFSET;
            const boardY = y - BOARD_OFFSET;

            // 개발자 모드에서 오브젝트 클릭 확인
            if (isDevMode && !isTestMode) {
              // 배치 모드: 툴박스에서 선택한 오브젝트 배치
              if (placementMode === 'place' && selectedTool) {
                if (selectedTool === 'marble') {
                  const newMarbles = [...devStage.marbles, { x: boardX, y: boardY, vx: 0, vy: 0, mass: 1 }];
                  editorSetDevStage({ ...devStage, marbles: newMarbles });
                  return;
                } else if (selectedTool === 'shooter') {
                  const newShooterPos = { ...devStage.shooter, x: boardX, y: boardY };
                  editorSetDevStage({ ...devStage, shooter: newShooterPos });
                  setShooterMarble(s => ({ ...s, x: boardX, y: boardY }));
                  return;
                } else if (selectedTool === 'spring') {
                  const newSprings = [...(devStage.springs || []), { x: boardX - 20, y: boardY - 20, size: 40, angle: 0, power: 20 }];
                  editorSetDevStage({ ...devStage, springs: newSprings });
                  return;
                } else if (selectedTool === 'wall') {
                  const newObs = [...(devStage.obstacles || []), { type: 'wall', x: boardX - 40, y: boardY - 8, width: 80, height: 16, restitution: 0.7 }];
                  editorSetDevStage({ ...devStage, obstacles: newObs });
                  return;
                } else if (selectedTool === 'sinkhole') {
                  const newObs = [...(devStage.obstacles || []), { type: 'sinkhole', x: boardX, y: boardY, radius: 28, threshold: 0.85 }];
                  editorSetDevStage({ ...devStage, obstacles: newObs });
                  return;
                } else if (selectedTool === 'magnet') {
                  const newObs = [...(devStage.obstacles || []), { type: 'magnet', x: boardX, y: boardY, level: 1, radius: 85, strength: 0.48, bodyRadius: 18 }];
                  editorSetDevStage({ ...devStage, obstacles: newObs });
                  return;
                } else if (selectedTool === 'crunch') {
                  const newObs = [...(devStage.obstacles || []), { type: 'crunch', x: boardX, y: boardY, radius: 22, restitution: 0.25, fragCount: 4, fragSpeed: 2.5, fragTTL: 1200 }];
                  editorSetDevStage({ ...devStage, obstacles: newObs });
                  return;
                } else if (selectedTool === 'greenBall') {
                  const newGBs = [...(devStage.greenBalls || []), { x: boardX, y: boardY, vx: 0, vy: 0, mass: 1 }];
                  editorSetDevStage({ ...devStage, greenBalls: newGBs });
                  return;
                } else if (selectedTool === 'floor') {
                  const newObs = [...(devStage.obstacles || []), { type: 'floor', subType: 'ice', x: boardX, y: boardY, radius: 50 }];
                  editorSetDevStage({ ...devStage, obstacles: newObs });
                  return;
                } else if (selectedTool === 'portal') {
                  const pairId = (devStage.obstacles.filter(o => o.type === 'portal').length / 2 | 0) + 1;
                  const newObs = [...(devStage.obstacles || []), { type: 'portal', x: boardX, y: boardY, pairId }];
                  editorSetDevStage({ ...devStage, obstacles: newObs });
                  return;
                } else if (selectedTool === 'bomb') {
                  const newObs = [...(devStage.obstacles || []), { type: 'bomb', x: boardX, y: boardY, radius: 25, power: 15, explosionRange: 150 }];
                  editorSetDevStage({ ...devStage, obstacles: newObs });
                  return;
                } else if (selectedTool === 'jump') {
                  const newObs = [...(devStage.obstacles || []), { type: 'jump', x: boardX, y: boardY, radius: 30 }];
                  editorSetDevStage({ ...devStage, obstacles: newObs });
                  return;
                } else if (selectedTool === 'button') {
                  const newObs = [...(devStage.obstacles || []), { type: 'button', subType: 'grow', x: boardX, y: boardY, radius: 20 }];
                  editorSetDevStage({ ...devStage, obstacles: newObs });
                  return;
                }
              }

              // 삭제 모드
              if (placementMode === 'delete') {
                // 스프링 삭제 확인
                for (let i = devStage.springs.length - 1; i >= 0; i--) {
                  const spring = devStage.springs[i];
                  const springSize = spring.size || 40;
                  if (boardX >= spring.x && boardX <= spring.x + springSize &&
                      boardY >= spring.y && boardY <= spring.y + springSize) {
                    const newSprings = devStage.springs.filter((_, idx) => idx !== i);
                    editorSetDevStage({ ...devStage, springs: newSprings });
                    return;
                  }
                }

                // 빨간 구슬 삭제 확인
                for (let i = 0; i < devStage.marbles.length; i++) {
                  const marble = devStage.marbles[i];
                  const marbleDx = boardX - marble.x;
                  const marbleDy = boardY - marble.y;
                  const marbleDistance = Math.sqrt(marbleDx * marbleDx + marbleDy * marbleDy);
                  if (marbleDistance < physicsConfig.puckRadius) {
                    const newMarbles = devStage.marbles.filter((_, idx) => idx !== i);
                    editorSetDevStage({ ...devStage, marbles: newMarbles });
                    return;
                  }
                }

                // 그린 고무공 삭제 확인
                const gbs = devStage.greenBalls || [];
                for (let i = 0; i < gbs.length; i++) {
                  const gb = gbs[i];
                  const gbDx = boardX - gb.x;
                  const gbDy = boardY - gb.y;
                  if (Math.sqrt(gbDx * gbDx + gbDy * gbDy) < physicsConfig.puckRadius) {
                    editorSetDevStage({ ...devStage, greenBalls: gbs.filter((_, idx) => idx !== i) });
                    return;
                  }
                }

                // 장애물 삭제 확인
                const obstacles = devStage.obstacles || [];
                for (let i = 0; i < obstacles.length; i++) {
                  const obs = obstacles[i];
                  let hit = false;
                  if (!obs.type || obs.type === 'wall') {
                    const wAngle = obs.angle || 0;
                    const hw2 = (obs.width || 80) / 2, hh2 = (obs.height || 16) / 2;
                    const wcx2 = obs.x + hw2, wcy2 = obs.y + hh2;
                    const cosW = Math.cos(-wAngle), sinW = Math.sin(-wAngle);
                    const lxW = cosW * (boardX - wcx2) - sinW * (boardY - wcy2);
                    const lyW = sinW * (boardX - wcx2) + cosW * (boardY - wcy2);
                    hit = Math.abs(lxW) <= hw2 && Math.abs(lyW) <= hh2;
                  } else {
                    const r = obs.radius || 28;
                    hit = Math.sqrt((boardX - obs.x) ** 2 + (boardY - obs.y) ** 2) < r;
                  }
                  if (hit) {
                    editorSetDevStage({ ...devStage, obstacles: obstacles.filter((_, idx) => idx !== i) });
                    return;
                  }
                }
                return;
              }

              // 선택된 스프링의 버튼 클릭 확인
              if (selectedObject && selectedObject.type === 'spring') {
                const spring = devStage.springs[selectedObject.index];
                const springX = spring.x + BOARD_OFFSET;
                const springY = spring.y + BOARD_OFFSET;
                const springSize = spring.size || 40;

                // 삭제 버튼 (상단)
                const deleteDistance = Math.sqrt(Math.pow(x - (springX + springSize/2), 2) + Math.pow(y - (springY - 15), 2));
                if (deleteDistance < 12) {
                  const newSprings = devStage.springs.filter((_, i) => i !== selectedObject.index);
                  editorSetDevStage({ ...devStage, springs: newSprings });
                  setSelectedObject(null);
                  return;
                }

                // 각도 조정 버튼 (왼쪽 - 반시계)
                const leftDistance = Math.sqrt(Math.pow(x - (springX - 15), 2) + Math.pow(y - (springY + springSize/2), 2));
                if (leftDistance < 12) {
                  const newSprings = [...devStage.springs];
                  newSprings[selectedObject.index].angle = (spring.angle - Math.PI/4) % (Math.PI * 2);
                  editorSetDevStage({ ...devStage, springs: newSprings });
                  return;
                }

                // 각도 조정 버튼 (오른쪽 - 시계)
                const rightDistance = Math.sqrt(Math.pow(x - (springX + springSize + 15), 2) + Math.pow(y - (springY + springSize/2), 2));
                if (rightDistance < 12) {
                  const newSprings = [...devStage.springs];
                  newSprings[selectedObject.index].angle = (spring.angle + Math.PI/4) % (Math.PI * 2);
                  editorSetDevStage({ ...devStage, springs: newSprings });
                  return;
                }
              }

              // move/inspect 모드: 오브젝트 선택 (move=드래그 이동, inspect=속성만)
              const canDrag = placementMode === 'move';

              // 스프링 클릭
              for (let i = devStage.springs.length - 1; i >= 0; i--) {
                const spring = devStage.springs[i];
                const springSize = spring.size || 40;
                if (boardX >= spring.x && boardX <= spring.x + springSize &&
                    boardY >= spring.y && boardY <= spring.y + springSize) {
                  if (canDrag) { setEditorHistory(h=>[...h.slice(-49),devStage]); setEditorFuture([]); }
                  setSelectedObject({ type: 'spring', index: i });
                  if (canDrag) setDraggingObject({ type: 'spring', index: i, offsetX: boardX - spring.x, offsetY: boardY - spring.y });
                  return;
                }
              }

              // 빨간 구슬 클릭
              for (let i = 0; i < devStage.marbles.length; i++) {
                const marble = devStage.marbles[i];
                const marbleDx = boardX - marble.x;
                const marbleDy = boardY - marble.y;
                if (Math.sqrt(marbleDx*marbleDx+marbleDy*marbleDy) < physicsConfig.puckRadius * 2) {
                  if (canDrag) { setEditorHistory(h=>[...h.slice(-49),devStage]); setEditorFuture([]); }
                  setSelectedObject({ type: 'marble', index: i });
                  if (canDrag) setDraggingObject({ type: 'marble', index: i, offsetX: marbleDx, offsetY: marbleDy });
                  return;
                }
              }

              // 그린 고무공 클릭
              const gbList = devStage.greenBalls || [];
              for (let i = 0; i < gbList.length; i++) {
                const gb = gbList[i];
                const gbDx = boardX - gb.x;
                const gbDy = boardY - gb.y;
                if (Math.sqrt(gbDx*gbDx+gbDy*gbDy) < physicsConfig.puckRadius * 2) {
                  if (canDrag) { setEditorHistory(h=>[...h.slice(-49),devStage]); setEditorFuture([]); }
                  setSelectedObject({ type: 'greenBall', index: i });
                  if (canDrag) setDraggingObject({ type: 'greenBall', index: i, offsetX: gbDx, offsetY: gbDy });
                  return;
                }
              }

              // 파란 구슬 클릭
              const shooterDx = boardX - shooterMarble.x;
              const shooterDy = boardY - shooterMarble.y;
              if (Math.sqrt(shooterDx*shooterDx+shooterDy*shooterDy) < physicsConfig.puckRadius * 2) {
                if (canDrag) { setEditorHistory(h=>[...h.slice(-49),devStage]); setEditorFuture([]); }
                setSelectedObject({ type: 'shooter' });
                if (canDrag) setDraggingObject({ type: 'shooter', offsetX: shooterDx, offsetY: shooterDy });
                return;
              }

              // 장애물 클릭
              const obstacles = devStage.obstacles || [];
              for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                let hit = false;
                if (!obs.type || obs.type === 'wall') {
                  const sAngle = obs.angle || 0;
                  const shw = (obs.width || 80) / 2, shh = (obs.height || 16) / 2;
                  const scx = obs.x + shw, scy = obs.y + shh;
                  const cosS = Math.cos(-sAngle), sinS = Math.sin(-sAngle);
                  const lxS = cosS * (boardX - scx) - sinS * (boardY - scy);
                  const lyS = sinS * (boardX - scx) + cosS * (boardY - scy);
                  hit = Math.abs(lxS) <= shw && Math.abs(lyS) <= shh;
                } else {
                  const r = obs.radius || 28;
                  hit = Math.sqrt((boardX - obs.x)**2 + (boardY - obs.y)**2) < r;
                }
                if (hit) {
                  if (canDrag) { setEditorHistory(h=>[...h.slice(-49),devStage]); setEditorFuture([]); }
                  setSelectedObject({ type: 'obstacle', index: i });
                  if (canDrag) setDraggingObject({ type: 'obstacle', index: i, offsetX: boardX - obs.x, offsetY: boardY - obs.y });
                  return;
                }
              }

              // 빈 곳 클릭 시 선택 해제
              setSelectedObject(null);
            }

            const dx = x - (shooterMarble.x + BOARD_OFFSET);
            const dy = y - (shooterMarble.y + BOARD_OFFSET);
            const distance = Math.sqrt(dx * dx + dy * dy);

            // 클릭 감지 범위를 3배로 늘림 (더 쉽게 클릭 가능)
            if (distance < physicsConfig.puckRadius * 3) {
              setGameState('aiming');
              setAimEnd({ x, y });
              pointerDownPosRef.current = { x, y }; // 시작점 기록 (드래그 임계값용)
            }
          };

          const aimEndRef = useRef(null);
          const pointerDownPosRef = useRef(null); // 터치 시작점 (드래그 임계값 계산용)

          const handlePointerMove = (e) => {
            const canvas = canvasRef.current;
            if (!canvas) return;

            const { x, y } = getEventCoordinates(e, canvas);
            const boardX = x - BOARD_OFFSET;
            const boardY = y - BOARD_OFFSET;

            // 드래그 중인 오브젝트 이동
            if (draggingObject) {
              if (draggingObject.type === 'spring') {
                const newSprings = [...devStage.springs];
                const spring = newSprings[draggingObject.index];
                const springSize = spring.size || 40;

                // 보드 안쪽에만 위치하도록 제한
                let newX = boardX - draggingObject.offsetX;
                let newY = boardY - draggingObject.offsetY;
                newX = Math.max(0, Math.min(BOARD_SIZE - springSize, newX));
                newY = Math.max(0, Math.min(BOARD_SIZE - springSize, newY));

                newSprings[draggingObject.index] = { ...spring, x: newX, y: newY };
                editorSetDevStage({ ...devStage, springs: newSprings }, true);
              } else if (draggingObject.type === 'marble') {
                const newMarbles = [...devStage.marbles];
                let newX = boardX - draggingObject.offsetX;
                let newY = boardY - draggingObject.offsetY;
                const radius = physicsConfig.puckRadius;
                newX = Math.max(radius, Math.min(BOARD_SIZE - radius, newX));
                newY = Math.max(radius, Math.min(BOARD_SIZE - radius, newY));
                newMarbles[draggingObject.index] = { ...newMarbles[draggingObject.index], x: newX, y: newY };
                editorSetDevStage({ ...devStage, marbles: newMarbles }, true);
              } else if (draggingObject.type === 'greenBall') {
                const newGBs = [...(devStage.greenBalls || [])];
                let newX = boardX - draggingObject.offsetX;
                let newY = boardY - draggingObject.offsetY;
                const radius = physicsConfig.puckRadius;
                newX = Math.max(radius, Math.min(BOARD_SIZE - radius, newX));
                newY = Math.max(radius, Math.min(BOARD_SIZE - radius, newY));
                newGBs[draggingObject.index] = { ...newGBs[draggingObject.index], x: newX, y: newY };
                editorSetDevStage({ ...devStage, greenBalls: newGBs }, true);
              } else if (draggingObject.type === 'shooter') {
                let newX = boardX - draggingObject.offsetX;
                let newY = boardY - draggingObject.offsetY;
                const radius = physicsConfig.puckRadius;
                newX = Math.max(radius, Math.min(BOARD_SIZE - radius, newX));
                newY = Math.max(radius, Math.min(BOARD_SIZE - radius, newY));
                setShooterMarble({ ...shooterMarble, x: newX, y: newY });
                editorSetDevStage({ ...devStage, shooter: { ...devStage.shooter, x: newX, y: newY }}, true);
              } else if (draggingObject.type === 'obstacle') {
                const newObstacles = [...(devStage.obstacles || [])];
                const obs = newObstacles[draggingObject.index];
                let newX = Math.max(0, Math.min(BOARD_SIZE, boardX - draggingObject.offsetX));
                let newY = Math.max(0, Math.min(BOARD_SIZE, boardY - draggingObject.offsetY));
                newObstacles[draggingObject.index] = { ...obs, x: newX, y: newY };
                editorSetDevStage({ ...devStage, obstacles: newObstacles }, true);
              }
              return;
            }

            if (gameState !== 'aiming') return;

            // 모바일 터치 과민감 방지: 최소 드래그 거리 임계값
            // 손가락을 살짝 올려놓기만 해도 조준선이 흔들리는 문제 해결
            const MIN_DRAG_THRESHOLD = isMobile ? 8 : 3; // 모바일은 8px, 데스크탑은 3px
            if (pointerDownPosRef.current) {
              const ddx = x - pointerDownPosRef.current.x;
              const ddy = y - pointerDownPosRef.current.y;
              const dragDist = Math.sqrt(ddx * ddx + ddy * ddy);
              if (dragDist < MIN_DRAG_THRESHOLD) return; // 임계값 미만은 무시
            }

            aimEndRef.current = { x, y };

            // requestAnimationFrame으로 부드럽게 업데이트
            requestAnimationFrame(() => {
              if (aimEndRef.current) {
                setAimEnd(aimEndRef.current);
              }
            });
          };

          const handlePointerUp = (e) => {
            // 드래그 종료
            if (draggingObject) {
              setDraggingObject(null);
              return;
            }

            if (gameState !== 'aiming') return;

            // 조준 중이다가 발사 처리
            if (aimEnd) {
              setComboCount(0); // 발사 시 콤보 초기화
              setShowTrajectory(false); // 발사 시 힌트 궤적 끔
              
              // UNDO를 위해 현재 상태 저장
              setGameHistory(prev => [...prev, {
                shooterMarble: { ...shooterMarble },
                marbles: marbles.map(m => ({ ...m })),
                shotsTaken: shotsTaken
              }]);

              const dx = shooterMarble.x - (aimEnd.x - BOARD_OFFSET);
              const dy = shooterMarble.y - (aimEnd.y - BOARD_OFFSET);
              const basePower = Math.min(Math.sqrt(dx * dx + dy * dy) / 10, 16.5);
              const power = basePower * physicsConfig.powerMultiplier;
              const angle = Math.atan2(dy, dx);

              setShooterMarble(prev => ({
                ...prev,
                vx: Math.cos(angle) * power,
                vy: Math.sin(angle) * power
              }));

              playSound('shoot');
              setShotsTaken(prev => prev + 1);
              setGameState('shooting');
            } else {
              // aimEnd가 없으면 그냥 조준 취소
              setGameState('ready');
            }

            setAimEnd(null);
            aimEndRef.current = null;
            pointerDownPosRef.current = null; // 시작점 초기화
          };

          const handleNextStage = () => {
            playSound('click');
            const newStagesCleared = stagesCleared + 1;
            setStagesCleared(newStagesCleared);

            // 현재 스테이지의 최고 별점 저장
            const currentBestStars = parseInt(localStorage.getItem(`stage_${currentStage}_stars`) || '0', 10);
            if (lastStageStars > currentBestStars) {
                localStorage.setItem(`stage_${currentStage}_stars`, lastStageStars.toString());
            }

            // 현재 스테이지를 클리어 목록에 추가
            const newClearedStages = new Set(clearedStages);
            newClearedStages.add(currentStage);

            if (newStagesCleared % 5 === 0) {
              setHintsRemaining(hintsRemaining + 1);
            }

            if (currentStage < stages.length) {
              const nextStage = currentStage + 1;
              newClearedStages.add(nextStage); // 다음 스테이지 잠금 해제
              setClearedStages(newClearedStages);
              setCurrentStage(nextStage);
            } else {
              setClearedStages(newClearedStages);
              setGameState('allcomplete');
            }
          };

          const handleStageSelect = (stageNum) => {
            if (clearedStages.has(stageNum)) {
              setCurrentStage(stageNum);
            }
          };

          const handlePrevStage = () => {
            playSound('click');
            if (currentMode === 'userStages') {
              if (currentUserStageIndex > 0) {
                const newIndex = currentUserStageIndex - 1;
                setCurrentUserStageIndex(newIndex);
                const stage = userStages[newIndex];
                setDevStage(stage.stage);
                if (stage.physics) {
                  setPhysicsConfig(stage.physics);
                }
                setShooterMarble({
                  x: stage.stage.shooter.x,
                  y: stage.stage.shooter.y,
                  vx: 0,
                  vy: 0,
                  mass: stage.stage.shooter.mass || 1
                });
                setMarbles(stage.stage.marbles.map(m => ({ ...m, vx: 0, vy: 0 })));
                setGameState('ready');
              }
            } else {
              if (currentStage > 1) {
                setCurrentStage(currentStage - 1);
              }
            }
          };

          const handleNextStageButton = () => {
            playSound('click');
            if (currentMode === 'userStages') {
              if (currentUserStageIndex < userStages.length - 1) {
                const newIndex = currentUserStageIndex + 1;
                setCurrentUserStageIndex(newIndex);
                const stage = userStages[newIndex];
                setDevStage(stage.stage);
                if (stage.physics) {
                  setPhysicsConfig(stage.physics);
                }
                setShooterMarble({
                  x: stage.stage.shooter.x,
                  y: stage.stage.shooter.y,
                  vx: 0,
                  vy: 0,
                  mass: stage.stage.shooter.mass || 1
                });
                setMarbles(stage.stage.marbles.map(m => ({ ...m, vx: 0, vy: 0 })));
                setGameState('ready');
              }
            } else {
              if (currentStage < stages.length) {
                setCurrentStage(currentStage + 1);
              }
            }
          };

          const handleRetry = () => {
            playSound('click');
            if (isDevMode) {
              // 개발자 모드에서는 현재 devStage로 다시 초기화
              setShooterMarble({
                x: devStage.shooter.x,
                y: devStage.shooter.y,
                vx: 0,
                vy: 0,
                mass: devStage.shooter.mass || 1
              });
              setMarbles(devStage.marbles.map(m => ({ ...m, vx: 0, vy: 0 })));
              setGameState('ready');
            } else if (currentMode === 'userStages') {
              // 사용자 정의 스테이지 모드
              const stage = userStages[currentUserStageIndex];
              if (stage) {
                setShooterMarble({
                  x: stage.stage.shooter.x,
                  y: stage.stage.shooter.y,
                  vx: 0,
                  vy: 0,
                  mass: stage.stage.shooter.mass || 1
                });
                setMarbles(stage.stage.marbles.map(m => ({ ...m, vx: 0, vy: 0 })));
                setGameState('ready');
              }
            } else {
              // 일반 퍼즐 모드
              initStage(currentStage);
            }
          };

          const handleUseHint = () => {
            if (hintsRemaining > 0 && gameState === 'ready') {
              setShowTrajectory(true);
              playSound('click');
              setHintsRemaining(hintsRemaining - 1);
            }
          };

          // 현재 스테이지 편집 모드로 진입
          const handleEditCurrentStage = () => {
            playSound('click');
            const stage = gameStages.find(s => s.id === currentStage);
            if (stage) {
              setDevStage({
                ...stage,
                marbles: marbles.map(m => ({ ...m, vx: 0, vy: 0 })),
                shooter: { ...shooterMarble, vx: 0, vy: 0 },
                greenBalls: greenBalls.map(g => ({ ...g, vx: 0, vy: 0 }))
              });
              setIsDevMode(true);
              setShowDevPanel(true);
              setIsTestMode(false);
            }
          };

          // 수정된 스테이지를 로컬 저장소에 영구 저장
          const handleSaveOverride = () => {
            playSound('click');
            const savedOverrides = localStorage.getItem('r_attack_stage_overrides');
            let overrides = {};
            if (savedOverrides) {
              try { overrides = JSON.parse(savedOverrides); } catch(e) {}
            }
            
            // 현재 devStage 데이터를 해당 stage id로 저장
            const stageData = {
              id: currentStage,
              name: devStage.name || `Stage ${currentStage}`,
              marbles: devStage.marbles.map(m => ({ x: m.x, y: m.y, mass: m.mass || 1 })),
              shooter: { x: devStage.shooter.x, y: devStage.shooter.y, mass: devStage.shooter.mass || 1 },
              obstacles: devStage.obstacles || [],
              greenBalls: (devStage.greenBalls || []).map(g => ({ x: g.x, y: g.y, mass: g.mass || 1 })),
              springs: devStage.springs || []
            };
            
            overrides[currentStage] = stageData;
            localStorage.setItem('r_attack_stage_overrides', JSON.stringify(overrides));
            
            // 실시간 반영을 위해 gameStages 업데이트
            setGameStages(prev => prev.map(s => s.id === currentStage ? { ...s, ...stageData } : s));
            alert(`스테이지 ${currentStage} ("${stageData.name}") 가 저장되었습니다!`);
          };

          // 모든 수정사항 초기화
          const handleResetAllOverrides = () => {
            if (confirm("모든 스테이지 수정사항을 지우고 원본 데이터로 되돌리시겠습니까?")) {
              localStorage.removeItem('r_attack_stage_overrides');
              setGameStages(stages);
              initStage(currentStage);
              alert("모든 수정사항이 초기화되었습니다.");
            }
          };

          // 전체 데이터 JSON 복사
          const handleExportAllStages = () => {
            const data = JSON.stringify(gameStages, null, 2);
            navigator.clipboard.writeText(data);
            alert("전체 스테이지 데이터가 클립보드에 복사되었습니다. (JSON 형식)");
          };

          // UNDO 기능: 이전 상태로 되돌리기
          const handleUndo = () => {
            if (gameHistory.length > 0 && gameState === 'ready') {
              playSound('click');
              const previousState = gameHistory[gameHistory.length - 1];

              // 이전 상태 복원
              setShooterMarble(previousState.shooterMarble);
              setMarbles(previousState.marbles);
              setShotsTaken(previousState.shotsTaken);

              // 히스토리에서 제거
              setGameHistory(prev => prev.slice(0, -1));
            }
          };

          return (
            <div className={`bg-gradient-to-br from-amber-950 via-stone-900 to-black ${isMobile ? 'min-h-screen flex flex-col' : 'min-h-screen flex items-start justify-center p-2 sm:p-4'}`}>
              <div className={`${isMobile ? 'w-full flex-1 flex flex-col' : 'w-full max-w-[724px]'}`} style={!isDevMode && !isMobile ? {
                transform: `scale(${scale})`,
                transformOrigin: 'top center'
              } : {}}>
                                  <div className={`bg-stone-800 shadow-2xl border-amber-900 ${isMobile ? 'flex-1 flex flex-col border-0' : 'rounded-lg shadow-2xl p-[10px] border-2'}`}>
                                    <div className={isMobile ? 'px-2 pt-2 pb-1' : 'mb-4'}>
                                      <div className="flex justify-between items-center mb-2">
                                        <h1 className={`font-bold text-amber-100 flex items-center gap-2 ${isMobile ? 'text-lg' : 'text-2xl sm:text-3xl mb-1'}`}>
                                          <div className={`bg-amber-700 rounded-full shadow-lg ${isMobile ? 'w-5 h-5' : 'w-8 h-8'}`}></div>
                                          {T.title}
                                        </h1>
                                        <div className="flex gap-1 sm:gap-2">
                                          {/* UNDO 버튼 (되돌리기) */}
                                          <button
                                            onClick={handleUndo}
                                            aria-label="되돌리기"
                                            disabled={showSettings || gameHistory.length === 0 || gameState !== 'ready'}
                                            className={`w-9 h-9 flex items-center justify-center rounded-lg transition-colors active:animate-bounce-sm shadow-lg border
                                              ${showSettings || gameHistory.length === 0 || gameState !== 'ready' ? 'bg-stone-800 opacity-30 cursor-not-allowed border-stone-700' : 'bg-orange-600 hover:bg-orange-500 border-orange-500'}
                                            `}
                                          >
                                            <Undo size={18} className="text-white" />
                                          </button>

                                          {/* 설정 버튼 */}
                                          <button
                                            onClick={() => { playSound('click'); setShowSettings(!showSettings); }}
                                            aria-label="설정"
                                            className="w-9 h-9 flex items-center justify-center bg-stone-700 hover:bg-stone-600 text-white rounded-lg shadow-lg border border-stone-600 transition-colors active:animate-bounce-sm"
                                          >
                                            <Settings size={18} />
                                          </button>

                                          {/* 다시하기 버튼 */}
                                          <button
                                            onClick={handleRetry}
                                            aria-label="다시 시작"
                                            disabled={showSettings}
                                            className={`w-9 h-9 flex items-center justify-center rounded-lg shadow-lg border transition-colors active:animate-bounce-sm
                                              ${showSettings ? 'bg-stone-800 opacity-30 cursor-not-allowed border-stone-700' : 'bg-stone-700 hover:bg-stone-600 border-stone-600'}
                                            `}
                                          >
                                            <RotateCcw size={18} className="text-white" />
                                          </button>

                                          {/* 힌트 버튼 */}
                                          <button
                                            onClick={handleUseHint}
                                            aria-label="힌트 사용"
                                            disabled={showSettings || hintsRemaining === 0 || gameState !== 'ready'}
                                            className={`w-9 h-9 flex items-center justify-center rounded-lg shadow-lg border transition-colors active:animate-bounce-sm
                                              ${showSettings || hintsRemaining === 0 || gameState !== 'ready' ? 'bg-stone-800 opacity-30 cursor-not-allowed border-stone-700' : 'bg-yellow-600 hover:bg-yellow-700 border-yellow-500'}
                                            `}
                                          >
                                            <Lightbulb size={18} className="text-white" />
                                          </button>

                                          {/* MODE 모드 버튼 */}
                                          <button
                                            onClick={() => {
                                              playSound('click');
                                              setShowModeMenu(!showModeMenu);
                                            }}
                                            aria-label="게임 모드"
                                            disabled={showSettings}
                                            className={`w-9 h-9 flex items-center justify-center text-[10px] font-bold rounded-lg shadow-lg border transition-colors active:animate-bounce-sm
                                              ${showSettings ? 'bg-stone-800 opacity-30 cursor-not-allowed border-stone-700' : showModeMenu ? 'bg-purple-600 hover:bg-purple-500 border-purple-500 text-white' : 'bg-stone-700 hover:bg-stone-600 border-stone-600 text-gray-400'}
                                            `}
                                          >
                                            MODE
                                          </button>

                                          {/* KR/EN 언어 전환 버튼 */}
                                          <button
                                            onClick={() => { playSound('click'); setLanguage(language === 'KR' ? 'EN' : 'KR'); }}
                                            aria-label="언어 전환"
                                            disabled={showSettings}
                                            className={`w-9 h-9 flex items-center justify-center text-[10px] font-bold rounded-lg shadow-lg border transition-colors active:animate-bounce-sm
                                              ${showSettings ? 'bg-stone-800 opacity-30 cursor-not-allowed border-stone-700' : 'bg-stone-700 hover:bg-stone-600 border-stone-600'}
                                            `}
                                          >
                                            <span className="text-amber-100">{language}</span>
                                          </button>
                                        </div>
                                      </div>
                
                                      {/* 스테이지 선택 컨트롤 */}
                                      <div className={`flex items-center justify-between bg-stone-700 rounded-lg border border-amber-900 ${isMobile ? 'p-1.5 mb-1' : 'mb-3 p-3'}`}>
                                        <button
                                          onClick={handlePrevStage}
                                          disabled={currentStage === 1 || isDevMode}
                                          className="p-1 sm:p-2 bg-stone-600 hover:bg-stone-500 disabled:bg-stone-800 disabled:opacity-30 disabled:cursor-not-allowed rounded-lg transition-colors active:animate-bounce-sm"
                                        >
                                          <ChevronLeft size={isMobile ? 16 : 20} className="text-amber-100" />
                                        </button>
                
                                                              <div className="flex-1 mx-1 sm:mx-3">
                                                                {currentMode === 'userStages' ? (
                                                                  <div className="text-center">
                                                                    <div className={`text-cyan-100 font-bold ${isMobile ? 'text-sm' : 'text-base sm:text-lg'}`}>
                                                                      📁 {T.userStage} {currentUserStageIndex + 1} {T.of} {userStages.length}
                                                                    </div>
                                                                    {!isMobile && (
                                                                      <div className="text-slate-400 text-xs sm:text-sm mt-1">
                                                                        {userStages[currentUserStageIndex]?.name || T.noStage}
                                                                      </div>
                                                                    )}
                                                                  </div>
                                                                ) : (
                                                                  <div className="text-center">
                                                                    <div className={`text-amber-100 font-bold ${isMobile ? 'text-sm' : 'text-base sm:text-lg'}`}>
                                                                      {T.stage} {currentStage} {T.of} {stages.length}
                                                                    </div>
                                                                    {!isMobile && (
                                                                      <div className="text-slate-400 text-xs sm:text-sm mt-1">
                                                                        {stages.find(s => s.id === currentStage)?.name}
                                                                      </div>
                                                                    )}
                                                                    {/* 현재 스테이지 최고 별점 */}
                                                                    <div className="flex justify-center mt-0.5">
                                                                      {[...Array(3)].map((_, i) => {
                                                                        const bestStars = parseInt(localStorage.getItem(`stage_${currentStage}_stars`) || '0', 10);
                                                                        return (
                                                                          <Star key={i} size={isMobile ? 12 : 16} className={`mx-0.5 ${i < bestStars ? 'text-yellow-400' : 'text-gray-500'}`} />
                                                                        );
                                                                      })}
                                                                    </div>
                                                                  </div>
                                                                )}
                                                              </div>                
                                        <button
                                          onClick={handleNextStageButton}
                                          disabled={currentStage === stages.length || isDevMode}
                                          className="p-1 sm:p-2 bg-stone-600 hover:bg-stone-500 disabled:bg-stone-800 disabled:opacity-30 disabled:cursor-not-allowed rounded-lg transition-colors active:animate-bounce-sm"
                                        >
                                          <ChevronRight size={isMobile ? 16 : 20} className="text-amber-100" />
                                        </button>
                                      </div>
                
                                      {/* 남은 기회 / 힌트 / 점수 — 모바일에서는 한 줄 압축 */}
                                      {isMobile ? (
                                        <div className="flex justify-between items-center text-xs px-1 pb-1">
                                          <span className="text-slate-300">{T.chances}: <span className="text-yellow-400 font-bold">{attemptsLeft === Infinity ? T.infinity : attemptsLeft}</span></span>
                                          <span className="text-slate-300 flex items-center gap-0.5"><Lightbulb size={11} className="text-yellow-400" /><span className="text-yellow-400 font-bold">{hintsRemaining}</span></span>
                                          <span className="text-slate-300">{T.score}: <span className="text-green-400 font-bold">{score}</span></span>
