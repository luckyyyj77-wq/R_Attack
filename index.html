    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
        <style>
          body {
            margin: 0;
            overflow: hidden;
            background-color: #1a202c; /* Tailwind's gray-900 */
          }
          @keyframes pop-in {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
          }
          .animate-pop-in {
            animation: pop-in 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
          }
          @keyframes bounce-sm {
            0%, 100% {
              transform: scale(1);

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Web Audio API를 이용한 간단한 사운드 생성
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        const createCollisionSound = (volume = 1.0) => {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 200;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3 * volume, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.1);
        };

        const createShootSound = (volume = 1.0) => {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.setValueAtTime(400, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(200, audioContext.currentTime + 0.2);
            oscillator.type = 'square';

            gainNode.gain.setValueAtTime(0.2 * volume, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.2);
        };

        const createFallSound = (volume = 1.0) => {
            // 멀어지는 "피유유우웅" 소리 - 도플러 효과
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            // 높은 음에서 낮은 음으로 부드럽게 하강 (멀어지는 느낌)
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(150, audioContext.currentTime + 0.8);
            oscillator.type = 'sine'; // 부드러운 사인파

            // 볼륨도 서서히 페이드아웃 (멀어지는 느낌)
            gainNode.gain.setValueAtTime(0.25 * volume, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.8);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.8);
        };

        const createClickSound = (volume = 1.0) => {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 800;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3 * volume, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.05);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.05);
        };

        // Lucide React 아이콘
        const Play = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
        );

        const Pause = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="6" y="4" width="4" height="16"></rect>
                <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
        );

        const RotateCcw = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="1 4 1 10 7 10"></polyline>
                <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
            </svg>
        );

        const Lightbulb = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="9" y1="18" x2="15" y2="18"></line>
                <line x1="10" y1="22" x2="14" y2="22"></line>
                <path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14"></path>
            </svg>
        );

        const Trophy = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path>
                <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path>
                <path d="M4 22h16"></path>
                <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path>
                <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path>
                <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path>
            </svg>
        );

        const ChevronLeft = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        );

        const ChevronRight = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        );

        const Star = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
            </svg>
        );

        const Settings = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 6.2 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 8.6a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
        );

        const Undo = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 7v6h6"></path>
                <path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"></path>
            </svg>
        );


        // 게임 상수 - 전역으로 정의
        const CANVAS_SIZE = 700;
        const BOARD_SIZE = 500;
        const BOARD_OFFSET = (CANVAS_SIZE - BOARD_SIZE) / 2;
        const EDGE_PUSH_DISTANCE = 120; // 60 -> 120: 더 천천히 부드럽게 밀려나감
        const PHYSICS_FPS = 60;
        const PHYSICS_INTERVAL = 1000 / PHYSICS_FPS;

        const findValidTeleportPosition = (marbles, obstacles, currentMarbleId, puckRadius = 15) => {
            const MAX_ATTEMPTS = 100;
            for (let i = 0; i < MAX_ATTEMPTS; i++) {
                const newX = puckRadius + Math.random() * (BOARD_SIZE - puckRadius * 2);
                const newY = puckRadius + Math.random() * (BOARD_SIZE - puckRadius * 2);

                let overlap = false;

                // Check overlap with other marbles
                for (const otherMarble of marbles) {
                    if (otherMarble.id === currentMarbleId) continue;
                    const dx = newX - otherMarble.x;
                    const dy = newY - otherMarble.y;
                    if (Math.sqrt(dx * dx + dy * dy) < puckRadius * 2) {
                        overlap = true;
                        break;
                    }
                }
                if (overlap) continue;

                // Check overlap with obstacles
                for (const obstacle of obstacles) {
                    const closestX = Math.max(obstacle.x, Math.min(newX, obstacle.x + obstacle.width));
                    const closestY = Math.max(obstacle.y, Math.min(newY, obstacle.y + obstacle.height));
                    const dx = newX - closestX;
                    const dy = newY - closestY;
                    if (Math.sqrt(dx * dx + dy * dy) < puckRadius) {
                        overlap = true;
                        break;
                    }
                }
                if (overlap) continue;

                return { x: newX, y: newY };
            }
            // If no valid position found after max attempts, return null
            return null;
        };

        const shouldFall = (marble, puckRadius = 15) => {
            const overLeft = puckRadius - marble.x;
            const overRight = marble.x - (BOARD_SIZE - puckRadius);
            const overTop = puckRadius - marble.y;
            const overBottom = marble.y - (BOARD_SIZE - puckRadius);

            const touchingEdges = [];
            if (overLeft > 0) touchingEdges.push('left');
            if (overRight > 0) touchingEdges.push('right');
            if (overTop > 0) touchingEdges.push('top');
            if (overBottom > 0) touchingEdges.push('bottom');

            // 모서리(2개 이상 경계 촉)와 일반 경계(1개 경계 촉)를 다르게 처리
            // 완전히 떨어지기 전에 더 본격적으로 (70%가 넘어가면 떨어짐)
            if (touchingEdges.length >= 2) {
                const threshold = puckRadius * 0.7;
                return overLeft > threshold || overRight > threshold || overTop > threshold || overBottom > threshold;
            } else if (touchingEdges.length === 1) {
                const threshold = puckRadius * 0.7;
                return overLeft > threshold || overRight > threshold || overTop > threshold || overBottom > threshold;
            }
            return false;
        };

        const createFallingMarble = (marble, isRed, puckRadius = 15) => {
            const overLeft = puckRadius - marble.x;
            const overRight = marble.x - (BOARD_SIZE - puckRadius);
            const overTop = puckRadius - marble.y;
            const overBottom = marble.y - (BOARD_SIZE - puckRadius);

            // 현재 위치에서 그냥 시작 (위치 조정 없음)
            let startX = marble.x;
            let startY = marble.y;

            // 속도 방향을 기반으로 낙하 방향 결정 (더 자연스러움)
            const velocityMagnitude = Math.sqrt(marble.vx * marble.vx + marble.vy * marble.vy);

            let pushDirectionX = 0;
            let pushDirectionY = 0;

            // 속도가 충분히 있으면 속도 방향으로 밀어냄
            if (velocityMagnitude > 0.3) {
                // 속도 방향 정규화
                const normalizedVx = marble.vx / velocityMagnitude;
                const normalizedVy = marble.vy / velocityMagnitude;

                // 속도 방향을 그냥 사용 (정규화된 값)
                pushDirectionX = normalizedVx;
                pushDirectionY = normalizedVy;
            } else {
                // 속도가 거의 없으면 경계에서 가장 가까운 방향으로 밀어냄
                if (overLeft > overRight && overLeft > 0) {
                    pushDirectionX = -1;
                } else if (overRight > 0) {
                    pushDirectionX = 1;
                }

                if (overTop > overBottom && overTop > 0) {
                    pushDirectionY = -1;
                } else if (overBottom > 0) {
                    pushDirectionY = 1;
                }
            }

            return {
                ...marble,
                startX: startX,
                startY: startY,
                pushDirectionX: pushDirectionX,
                pushDirectionY: pushDirectionY,
                fallProgress: 0,
                startSize: puckRadius,
                isRed: isRed
            };
        };

        const MarblePuzzleGame = () => {
          const lastCollisionSoundTime = useRef(0);

          // Load high score from localStorage on mount
          useEffect(() => {
            const storedHighScore = parseInt(localStorage.getItem('highScore') || '0', 10);
            setHighScore(storedHighScore);
          }, []);

          const playSound = (soundName, options = {}) => {
              if (!soundEnabled) return; // Don't play if sound is disabled

              if (soundName === 'collision') {
                  const now = Date.now();
                  if (now - lastCollisionSoundTime.current < 50) { // 50ms throttle
                      return;
                  }
                  lastCollisionSoundTime.current = now;
              }

              // 볼륨 조절을 위해 마스터 볼륨 적용
              const finalVolume = (options.volume || 1.0) * masterVolume;

              try {
                  if (soundName === 'collision') {
                      createCollisionSound(finalVolume);
                  } else if (soundName === 'shoot') {
                      createShootSound(finalVolume);
                  } else if (soundName === 'fall') {
                      createFallSound(finalVolume);
                  } else if (soundName === 'click') {
                      createClickSound(finalVolume);
                  }
              } catch (err) {
                  // 오디오 재생 실패 무시
              }
          };

          const canvasRef = useRef(null);
          const woodTextureRef = useRef(null);
          const hasFallenRef = useRef(false); // 파란 구슬이 이미 떨어졌는지 추적
          const [gameState, setGameState] = useState('ready');
          const [currentStage, setCurrentStage] = useState(1);
          const [marbles, setMarbles] = useState([]);
          const [shooterMarble, setShooterMarble] = useState({ x: 0, y: 0 });
          const [fallingMarbles, setFallingMarbles] = useState([]);
          const [shooterFalling, setShooterFalling] = useState(null);
          const shooterFallingRef = useRef(shooterFalling);
          shooterFallingRef.current = shooterFalling;
          const [showSettings, setShowSettings] = useState(false); // New state for settings modal
          const [masterVolume, setMasterVolume] = useState(1.0); // New state for master volume
          const [soundEnabled, setSoundEnabled] = useState(true); // New state for sound on/off
          const [shotsTaken, setShotsTaken] = useState(0); // New state for shots taken per stage
          const [lastStageStars, setLastStageStars] = useState(0); // New state for stars earned in the last cleared stage
          const [score, setScore] = useState(0); // New state for current score
          const [highScore, setHighScore] = useState(0); // New state for high score
          const collisionPopRef = useRef({}); // New ref to track marble collision for pop animation
          const [particles, setParticles] = useState([]); // New state for particles
          const [aimEnd, setAimEnd] = useState(null);
          const [isPaused, setIsPaused] = useState(false); // New state for pause functionality
          const [hintsRemaining, setHintsRemaining] = useState(0);
          const [showTrajectory, setShowTrajectory] = useState(false);
          const [attemptsLeft, setAttemptsLeft] = useState(Infinity);
          const [stagesCleared, setStagesCleared] = useState(0);
          const [clearedStages, setClearedStages] = useState(new Set([1])); // 클리어한 스테이지 추적
          const [language, setLanguage] = useState('KR'); // 언어 상태 (KR/EN)
          const [showModeMenu, setShowModeMenu] = useState(false); // 모드 메뉴 표시 상태
          const [currentMode, setCurrentMode] = useState('puzzle'); // 현재 게임 모드 (puzzle, multi, ai, custom, userStages)
          const [gameHistory, setGameHistory] = useState([]); // UNDO를 위한 게임 상태 히스토리

          // 사용자 정의 스테이지 관리
          const [userStages, setUserStages] = useState(() => {
            const saved = localStorage.getItem('userCustomStages');
            return saved ? JSON.parse(saved) : [];
          });
          const [currentUserStageIndex, setCurrentUserStageIndex] = useState(0);

          // 반응형 스케일 계산
          const [scale, setScale] = useState(1);

          useEffect(() => {
            const calculateScale = () => {
              const viewportHeight = window.innerHeight;
              const viewportWidth = window.innerWidth;
              const contentHeight = 1100; // 예상 콘텐츠 높이
              const contentWidth = 724; // 콘텐츠 너비
              const padding = 40;

              if (isDevMode) {
                // 개발자 모드: 좌우 패널 공간(약 400px) 고려
                const availableWidth = viewportWidth - 400;
                const scaleX = Math.min(1, (availableWidth - padding) / contentWidth);
                const scaleY = Math.min(1, (viewportHeight - padding) / contentHeight);
                const calculatedScale = Math.min(scaleX, scaleY);
                setScale(calculatedScale);
              } else {
                // 일반 모드: 높이 기준으로만 스케일 조정
                const calculatedScale = Math.min(1, (viewportHeight - padding) / contentHeight);
                setScale(calculatedScale);
              }
            };

            calculateScale();
            window.addEventListener('resize', calculateScale);
            return () => window.removeEventListener('resize', calculateScale);
          }, [isDevMode]);

          // 개발자 모드 상태
          const [isDevMode, setIsDevMode] = useState(false); // 개발자 모드 활성화
          const [showDevPanel, setShowDevPanel] = useState(false); // 개발자 패널 표시
          const [devPanelSections, setDevPanelSections] = useState({
            physics: true,     // 물리 법칙
            objects: false,    // 오브젝트 배치
            stage: false,      // 스테이지 설정
            save: false        // 저장/불러오기
          });

          // 레벨 에디터 상태
          const [isTestMode, setIsTestMode] = useState(false); // 테스트 모드 (플레이 가능)
          const [selectedTool, setSelectedTool] = useState(null); // 선택된 툴 (marble, shooter, spring, wall 등)
          const [placementMode, setPlacementMode] = useState('select'); // select, place, delete

          // 조정 가능한 물리 법칙
          const [physicsConfig, setPhysicsConfig] = useState({
            timeScale: 1.0,           // 게임 속도
            friction: 0.98,           // 마찰력
            bounceDamping: 0.7,       // 반발력
            gravity: 0.0,             // 중력 (기본 0)
            puckRadius: 15,           // 구슬 크기
            defaultMass: 1,           // 기본 질량
            powerMultiplier: 1.0,     // 파워 배율 (기본 1.0 = 16.5 파워)
            collisionEnergyLoss: 0.92 // 충돌 에너지 손실
          });

          // 개발자 모드 스테이지 (빈 스테이지)
          const [devStage, setDevStage] = useState({
            marbles: [],              // 빨간 구슬들
            shooter: { x: 250, y: 250, mass: 1 }, // 파란 구슬 중앙
            obstacles: [],            // 장애물
            springs: []               // 스프링 오브젝트
          });

          // 드래그 중인 오브젝트 상태
          const [draggingObject, setDraggingObject] = useState(null); // { type: 'spring', index: 0 }

          // 선택된 오브젝트 상태
          const [selectedObject, setSelectedObject] = useState(null); // { type: 'spring'/'shooter', index: 0 }
          const animationRef = useRef(null);
          const stuckFrameCountRef = useRef(0); // 물리 엔진 멈춤 감지
          const lastPositionsRef = useRef({ shooter: null, marbles: [] }); // 이전 프레임 위치

          // Particle update useEffect
          useEffect(() => {
              const updateParticles = () => {
                  setParticles(prevParticles =>
                      prevParticles.map(p => ({
                          ...p,
                          x: p.x + p.vx,
                          y: p.y + p.vy,
                          life: p.life - 1,
                          size: p.size * 0.98, // Shrink over time
                          alpha: p.alpha * 0.95 // Fade over time
                      })).filter(p => p.life > 0 && p.size > 0.5 && p.alpha > 0.05)
                  );
              };

              const intervalId = setInterval(updateParticles, 16); // Update particles at ~60fps
              return () => clearInterval(intervalId);
          }, []);

          const createParticles = (x, y, type) => {
              const newParticles = [];
              let count = 0;
              let color = '';
              let size = 0;
              let speed = 0;

              if (type === 'collision') {
                  count = 5;
                  color = '#FFFFFF'; // White sparks
                  size = 3;
                  speed = 2;
              } else if (type === 'fall') {
                  count = 10;
                  color = '#8B4513'; // Brown dust
                  size = 5;
                  speed = 1;
              }

              for (let i = 0; i < count; i++) {

                          playSound('collision'); createParticles(m1.x + (dx/2), m1.y + (dy/2), 'collision'); collisionPopRef.current[m1.id] = Date.now(); collisionPopRef.current[m2.id] = Date.now();
                        }

                        if (iteration === 0) { // 첫 반복에서만 속도 계산
                          const angle = Math.atan2(dy, dx);
                          const sin = Math.sin(angle);
                          const cos = Math.cos(angle);

                          const v1n = m1.vx * cos + m1.vy * sin;
                          const v1t = m1.vy * cos - m1.vx * sin;
                          const v2n = m2.vx * cos + m2.vy * sin;
                          const v2t = m2.vy * cos - m2.vx * sin;

                          const mass1 = m1.mass;
                          const mass2 = m2.mass;

                          const v1n_final = (v1n * (mass1 - mass2) + 2 * mass2 * v2n) / (mass1 + mass2);
                          const v2n_final = (v2n * (mass2 - mass1) + 2 * mass1 * v1n) / (mass1 + mass2);

                          // 충돌 후 에너지 손실 적용
                          m1.vx = (v1n_final * cos - v1t * sin) * physicsConfig.collisionEnergyLoss;
                          m1.vy = (v1t * cos + v1n_final * sin) * physicsConfig.collisionEnergyLoss;
                          m2.vx = (v2n_final * cos - v2t * sin) * physicsConfig.collisionEnergyLoss;
                          m2.vy = (v2t * cos + v2n_final * sin) * physicsConfig.collisionEnergyLoss;
                        }

                        // 겹침 해소
                        const overlap = physicsConfig.puckRadius * 2 - distance;
                        if (overlap > 0) {
                            const normalX = dx / distance;
                            const normalY = dy / distance;
                            const separation = overlap * 0.52;
                            m1.x -= normalX * separation;
                            m1.y -= normalY * separation;
                            m2.x += normalX * separation;
                            m2.y += normalY * separation;
                        }
                      }
                    }
                  }
                }

                // 판 경계에서 떨어지는 로직에서 처리 (충돌과 다름)

                // 장애물 충돌 (현재는 사각형만)
                const allMarbles = [newShooter, ...newMarbles];
                allMarbles.forEach(marble => {
                    const currentStageData = stages.find(s => s.id === currentStage);
                    if (currentStageData && currentStageData.obstacles && currentStageData.obstacles.length > 0) {
                        currentStageData.obstacles.forEach(obstacle => {
                            const closestX = Math.max(obstacle.x, Math.min(marble.x, obstacle.x + obstacle.width));
                            const closestY = Math.max(obstacle.y, Math.min(newY, obstacle.y + obstacle.height));
                            const dx = marble.x - closestX;
                            const dy = marble.y - closestY;
                            const distance = Math.sqrt(dx * dx + dy * dy);

                            if (distance < physicsConfig.puckRadius && distance > 0.01) {
                                playSound('collision');
                                const overlap = physicsConfig.puckRadius - distance;
                                const normalX = dx / distance;
                                const normalY = dy / distance;
                                marble.x += normalX * overlap * 1.05;
                                marble.y += normalY * overlap * 1.05;
                                const dotProduct = marble.vx * normalX + marble.vy * normalY;
                                marble.vx -= 2 * dotProduct * normalX;
                                marble.vy -= 2 * dotProduct * normalY;
                                marble.vx *= physicsConfig.bounceDamping;
                                marble.vy *= physicsConfig.bounceDamping;
                            }
                        });
                    }
                });

                const marblesOnBoard = [];
                const marblesFalling = [];
                newMarbles.forEach(m => {
                    if (shouldFall(m, puckRadius)) {
                        if (!fallSoundPlayedThisFrame) { playSound('fall'); fallSoundPlayedThisFrame = true; }
                        marblesFalling.push(createFallingMarble(m, true, puckRadius));
                    } else {
                        marblesOnBoard.push(m);
                    }
                });

                if (marblesFalling.length > 0) {
                    setFallingMarbles(prev => [...prev, ...marblesFalling]);
                }
                setMarbles(marblesOnBoard);

                // 파란 구슬이 떨어지는 중이거나 이미 떨어졌으면 물리 업데이트 중단
                if (shooterFallingRef.current || hasFallenRef.current) {
                    // 떨어지는 중이거나 이미 떨어진 경우 아무것도 하지 않음
                } else {
                    // 파란 구슬 낙하 판정
                    if (shouldFall(newShooter, puckRadius)) {

                        }
                        setShooterFalling(createFallingMarble(newShooter, false, puckRadius));

                if (shooterFallingRef.current || marblesFalling.length > 0) {

                } else {

                                     marblesOnBoard.every(m => Math.abs(m.vx) < 0.1 && Math.abs(m.vy) < 0.1);
                    if (allStopped) {
                        if (marblesOnBoard.length === 0) {
                            const stage = stages.find(s => s.id === currentStage);
                            let stars = 0;
                            if (stage.starCriteria) {
                                if (shotsTaken <= stage.starCriteria[3]) stars = 3;
                                else if (shotsTaken <= stage.starCriteria[2]) stars = 2;
                                else if (shotsTaken <= stage.starCriteria[1]) stars = 1;
                            }
                            setLastStageStars(stars);
                            setGameState('complete');
                            if (score > highScore) { setHighScore(score); localStorage.setItem('highScore', score.toString()); }
                        } else {
                            if (attemptsLeft === Infinity) {
                                setGameState('ready');
                            } else if (attemptsLeft > 1) {

                            }
                        }
                    }
                }

            };

            if (!animationRef.current) {

            }

            return () => {
              if (animationRef.current) {

          }, [gameState, isPaused, shooterMarble, marbles, attemptsLeft]);



          // 렌더링 최적화를 위한 requestAnimationFrame 기반 렌더링

              // 조준선 렌더링 (스테이지 1-9에서 보드 끝까지)
              if (aimEnd && gameState === 'aiming') {
                const startX = shooterMarble.x;
                const startY = shooterMarble.y;
                const aimX = aimEnd.x - BOARD_OFFSET;

                const dx = startX - aimX;
                const dy = startY - aimY;
                const angle = Math.atan2(dy, dx);

                let maxDistance = 1000;

                  if (t > 0) maxDistance = Math.min(maxDistance, t);

                const dy = shooterMarble.y - aimY;

                const angle = Math.atan2(dy, dx);

                const power = Math.min(distance / 10, 16.5); // 10% 증가: 15 -> 16.5
                const powerPercentage = Math.round((power / 16.5) * 100);

                // 파워에 따른 화살표 색상 결정 (4단계)
                let arrowColor;
                if (powerPercentage < 25) {

                } else if (powerPercentage < 50) {
                  arrowColor = '#eab308'; // 옐로우
                } else if (powerPercentage < 75) {

                } else {

                const arrowLength = Math.min(distance, 150);
                const endX = shooterMarble.x + Math.cos(angle) * arrowLength;
                const endY = shooterMarble.y + Math.sin(angle) * arrowLength;

                ctx.lineWidth = 4 + (power / 16.5) * 6; // 더 굵게

                );
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                ctx.fillStyle = arrowColor;
                ctx.strokeStyle = '#000000';

                ctx.strokeText(powerText, endX + BOARD_OFFSET + 15, endY + BOARD_OFFSET);

              }

              // 떨어지는 빨간 구슬 렌더링

                  Math.PI * 2
                );
                ctx.fill();
                ctx.strokeStyle = '#7f1d1d';
                ctx.lineWidth = 2;
                ctx.stroke();

              });

                // easeOutCubic: 빠르게 시작, 천천히 끝남 (스르륵 미끄러지는 느낌)
                const easedPush = 1 - Math.pow(1 - pushPhase, 3);
                const offsetX = shooterFalling.pushDirectionX * EDGE_PUSH_DISTANCE * easedPush;
                const offsetY = shooterFalling.pushDirectionY * EDGE_PUSH_DISTANCE * easedPush;
                const currentSize = shooterFalling.startSize * (1 - fadePhase * 0.9);
                const alpha = 1 - (fadePhase * fadePhase);

                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
                ctx.shadowBlur = fadePhase * 15;
                ctx.fillStyle = '#3b82f6';
                ctx.beginPath();
                ctx.arc(
                  shooterFalling.startX + BOARD_OFFSET + offsetX,
                  shooterFalling.startY + BOARD_OFFSET + offsetY,

                );
                ctx.fill();
                ctx.strokeStyle = '#1e40af';
                ctx.lineWidth = 2;
                ctx.stroke();

              }

              // 빨간 구슬 렌더링
              marbles.forEach(marble => {

                let scaleFactor = 1;

                ctx.strokeStyle = '#b91c1c';

            };

          }, [marbles, shooterMarble, gameState, aimEnd, fallingMarbles, shooterFalling, particles, currentStage]);

          const getEventCoordinates = (e, canvas) => {

            const scaleX = canvas.width / rect.width;

            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            return { x, y };
          };

          const handlePointerDown = (e) => {
            if (gameState !== 'ready') return;

            const canvas = canvasRef.current;
            const { x, y } = getEventCoordinates(e, canvas);

            const boardY = y - BOARD_OFFSET;

            // 개발자 모드에서 오브젝트 클릭 확인

                if (selectedTool === 'marble') {
                  // 빨간 구슬 추가
                  const newMarbles = [...devStage.marbles, { x: boardX, y: boardY, vx: 0, vy: 0, mass: 1 }];
                  setDevStage({ ...devStage, marbles: newMarbles });
                  return;
                } else if (selectedTool === 'shooter') {
                  // 파란 구슬(슈터) 위치 변경
                  setDevStage({ ...devStage, shooter: { ...devStage.shooter, x: boardX, y: boardY } });
                  return;
                } else if (selectedTool === 'spring') {
                  // 스프링 추가
                  const newSprings = [...(devStage.springs || []), { x: boardX - 20, y: boardY - 20, size: 40, angle: 0, power: 20 }];
                  setDevStage({ ...devStage, springs: newSprings });
                  return;
                }
              }

              // 삭제 모드
              if (placementMode === 'delete') {
                // 스프링 삭제 확인
                for (let i = devStage.springs.length - 1; i >= 0; i--) {
                  const spring = devStage.springs[i];
                  const springSize = spring.size || 40;
                  if (boardX >= spring.x && boardX <= spring.x + springSize &&
                      boardY >= spring.y && boardY <= spring.y + springSize) {
                    const newSprings = devStage.springs.filter((_, idx) => idx !== i);
                    setDevStage({ ...devStage, springs: newSprings });
                    return;
                  }
                }

                // 빨간 구슬 삭제 확인
                for (let i = 0; i < devStage.marbles.length; i++) {
                  const marble = devStage.marbles[i];
                  const marbleDx = boardX - marble.x;
                  const marbleDy = boardY - marble.y;
                  const marbleDistance = Math.sqrt(marbleDx * marbleDx + marbleDy * marbleDy);
                  if (marbleDistance < physicsConfig.puckRadius) {
                    const newMarbles = devStage.marbles.filter((_, idx) => idx !== i);
                    setDevStage({ ...devStage, marbles: newMarbles });
                    return;
                  }
                }
                return;
              }

              // 선택된 스프링의 버튼 클릭 확인
              if (selectedObject && selectedObject.type === 'spring') {
                const spring = devStage.springs[selectedObject.index];
                const springX = spring.x + BOARD_OFFSET;
                const springY = spring.y + BOARD_OFFSET;
                const springSize = spring.size || 40;

                // 삭제 버튼 (상단)
                const deleteDistance = Math.sqrt(Math.pow(x - (springX + springSize/2), 2) + Math.pow(y - (springY - 15), 2));
                if (deleteDistance < 12) {
                  const newSprings = devStage.springs.filter((_, i) => i !== selectedObject.index);
                  setDevStage({ ...devStage, springs: newSprings });
                  setSelectedObject(null);
                  return;
                }

                // 각도 조정 버튼 (왼쪽 - 반시계)
                const leftDistance = Math.sqrt(Math.pow(x - (springX - 15), 2) + Math.pow(y - (springY + springSize/2), 2));
                if (leftDistance < 12) {
                  const newSprings = [...devStage.springs];
                  newSprings[selectedObject.index].angle = (spring.angle - Math.PI/4) % (Math.PI * 2);
                  setDevStage({ ...devStage, springs: newSprings });
                  return;
                }

                // 각도 조정 버튼 (오른쪽 - 시계)
                const rightDistance = Math.sqrt(Math.pow(x - (springX + springSize + 15), 2) + Math.pow(y - (springY + springSize/2), 2));
                if (rightDistance < 12) {
                  const newSprings = [...devStage.springs];
                  newSprings[selectedObject.index].angle = (spring.angle + Math.PI/4) % (Math.PI * 2);
                  setDevStage({ ...devStage, springs: newSprings });
                  return;
                }
              }

              // 스프링 클릭 확인
              for (let i = devStage.springs.length - 1; i >= 0; i--) {
                const spring = devStage.springs[i];
                const springSize = spring.size || 40;
                if (boardX >= spring.x && boardX <= spring.x + springSize &&
                    boardY >= spring.y && boardY <= spring.y + springSize) {
                  setSelectedObject({ type: 'spring', index: i });
                  setDraggingObject({ type: 'spring', index: i, offsetX: boardX - spring.x, offsetY: boardY - spring.y });
                  return;
                }
              }

              // 빨간 구슬 클릭 확인
              for (let i = 0; i < devStage.marbles.length; i++) {
                const marble = devStage.marbles[i];
                const marbleDx = boardX - marble.x;
                const marbleDy = boardY - marble.y;
                const marbleDistance = Math.sqrt(marbleDx * marbleDx + marbleDy * marbleDy);
                if (marbleDistance < physicsConfig.puckRadius * 2) {
                  setSelectedObject({ type: 'marble', index: i });
                  setDraggingObject({ type: 'marble', index: i, offsetX: marbleDx, offsetY: marbleDy });
                  return;
                }
              }

              // 파란 구슬 클릭 확인
              const shooterDx = boardX - shooterMarble.x;
              const shooterDy = boardY - shooterMarble.y;
              const shooterDistance = Math.sqrt(shooterDx * shooterDx + shooterDy * shooterDy);
              if (shooterDistance < physicsConfig.puckRadius * 2) {
                setSelectedObject({ type: 'shooter' });
                setDraggingObject({ type: 'shooter', offsetX: shooterDx, offsetY: shooterDy });
                return;
              }

              // 빈 곳 클릭 시 선택 해제
              setSelectedObject(null);
            }

            const dx = x - (shooterMarble.x + BOARD_OFFSET);
            const dy = y - (shooterMarble.y + BOARD_OFFSET);
            const distance = Math.sqrt(dx * dx + dy * dy);

            // 클릭 감지 범위를 3배로 늘림 (더 쉽게 클릭 가능)
            if (distance < physicsConfig.puckRadius * 3) {
              setGameState('aiming');
              setAimEnd({ x, y });
            }
          };

          const aimEndRef = useRef(null);

          const handlePointerMove = (e) => {
            const canvas = canvasRef.current;
            if (!canvas) return;

            const { x, y } = getEventCoordinates(e, canvas);
            const boardX = x - BOARD_OFFSET;
            const boardY = y - BOARD_OFFSET;

            // 드래그 중인 오브젝트 이동
            if (draggingObject) {
              if (draggingObject.type === 'spring') {
                const newSprings = [...devStage.springs];
                const spring = newSprings[draggingObject.index];
                const springSize = spring.size || 40;

                // 보드 안쪽에만 위치하도록 제한
                let newX = boardX - draggingObject.offsetX;
                let newY = boardY - draggingObject.offsetY;
                newX = Math.max(0, Math.min(BOARD_SIZE - springSize, newX));
                newY = Math.max(0, Math.min(BOARD_SIZE - springSize, newY));

                newSprings[draggingObject.index] = { ...spring, x: newX, y: newY };
                setDevStage({ ...devStage, springs: newSprings });
              } else if (draggingObject.type === 'marble') {
                // 빨간 구슬 드래그
                const newMarbles = [...devStage.marbles];
                let newX = boardX - draggingObject.offsetX;
                let newY = boardY - draggingObject.offsetY;
                const radius = physicsConfig.puckRadius;
                newX = Math.max(radius, Math.min(BOARD_SIZE - radius, newX));
                newY = Math.max(radius, Math.min(BOARD_SIZE - radius, newY));

                newMarbles[draggingObject.index] = { ...newMarbles[draggingObject.index], x: newX, y: newY };
                setDevStage({ ...devStage, marbles: newMarbles });
              } else if (draggingObject.type === 'shooter') {
                // 파란 구슬 드래그
                let newX = boardX - draggingObject.offsetX;
                let newY = boardY - draggingObject.offsetY;
                const radius = physicsConfig.puckRadius;
                newX = Math.max(radius, Math.min(BOARD_SIZE - radius, newX));
                newY = Math.max(radius, Math.min(BOARD_SIZE - radius, newY));

                setShooterMarble({ ...shooterMarble, x: newX, y: newY });
                setDevStage({ ...devStage, shooter: { ...devStage.shooter, x: newX, y: newY }});
              }
              return;
            }

            if (gameState !== 'aiming') return;

            aimEndRef.current = { x, y };

            // requestAnimationFrame으로 부드럽게 업데이트
            requestAnimationFrame(() => {
              if (aimEndRef.current) {
                setAimEnd(aimEndRef.current);
              }
            });
          };

          const handlePointerUp = (e) => {
            // 드래그 종료
            if (draggingObject) {
              setDraggingObject(null);
              return;
            }

            if (gameState !== 'aiming') return;

            // 조준 중이다가 발사 처리
            if (aimEnd) {
              // UNDO를 위해 현재 상태 저장
              setGameHistory(prev => [...prev, {
                shooterMarble: { ...shooterMarble },
                marbles: marbles.map(m => ({ ...m })),
                shotsTaken: shotsTaken
              }]);

              const dx = shooterMarble.x - (aimEnd.x - BOARD_OFFSET);
              const dy = shooterMarble.y - (aimEnd.y - BOARD_OFFSET);
              const basePower = Math.min(Math.sqrt(dx * dx + dy * dy) / 10, 16.5);
              const power = basePower * physicsConfig.powerMultiplier;
              const angle = Math.atan2(dy, dx);

              setShooterMarble(prev => ({
                ...prev,
                vx: Math.cos(angle) * power,
                vy: Math.sin(angle) * power
              }));

              playSound('shoot');
              setShotsTaken(prev => prev + 1);
              setGameState('shooting');
            } else {
              // aimEnd가 없으면 그냥 조준 취소
              setGameState('ready');
            }

            setAimEnd(null);
            aimEndRef.current = null;
          };

          const handleNextStage = () => {
            playSound('click');
            const newStagesCleared = stagesCleared + 1;
            setStagesCleared(newStagesCleared);

            // 현재 스테이지의 최고 별점 저장
            const currentBestStars = parseInt(localStorage.getItem(`stage_${currentStage}_stars`) || '0', 10);
            if (lastStageStars > currentBestStars) {
                localStorage.setItem(`stage_${currentStage}_stars`, lastStageStars.toString());
            }

            // 현재 스테이지를 클리어 목록에 추가
            const newClearedStages = new Set(clearedStages);
            newClearedStages.add(currentStage);

            if (newStagesCleared % 5 === 0) {
              setHintsRemaining(hintsRemaining + 1);
            }

            if (currentStage < stages.length) {
              const nextStage = currentStage + 1;
              newClearedStages.add(nextStage); // 다음 스테이지 잠금 해제
              setClearedStages(newClearedStages);
              setCurrentStage(nextStage);
            } else {
              setClearedStages(newClearedStages);
              setGameState('allcomplete');
            }
          };

          const handleStageSelect = (stageNum) => {
            if (clearedStages.has(stageNum)) {
              setCurrentStage(stageNum);
            }
          };

          const handlePrevStage = () => {
            playSound('click');
            if (currentMode === 'userStages') {
              if (currentUserStageIndex > 0) {
                const newIndex = currentUserStageIndex - 1;
                setCurrentUserStageIndex(newIndex);
                const stage = userStages[newIndex];
                setDevStage(stage.stage);
                if (stage.physics) {
                  setPhysicsConfig(stage.physics);
                }
                setShooterMarble({
                  x: stage.stage.shooter.x,
                  y: stage.stage.shooter.y,
                  vx: 0,
                  vy: 0,
                  mass: stage.stage.shooter.mass || 1
                });
                setMarbles(stage.stage.marbles.map(m => ({ ...m, vx: 0, vy: 0 })));
                setGameState('ready');
              }
            } else {
              if (currentStage > 1) {
                setCurrentStage(currentStage - 1);
              }
            }
          };

          const handleNextStageButton = () => {
            playSound('click');
            if (currentMode === 'userStages') {
              if (currentUserStageIndex < userStages.length - 1) {
                const newIndex = currentUserStageIndex + 1;
                setCurrentUserStageIndex(newIndex);
                const stage = userStages[newIndex];
                setDevStage(stage.stage);
                if (stage.physics) {
                  setPhysicsConfig(stage.physics);
                }
                setShooterMarble({
                  x: stage.stage.shooter.x,
                  y: stage.stage.shooter.y,
                  vx: 0,
                  vy: 0,
                  mass: stage.stage.shooter.mass || 1
                });
                setMarbles(stage.stage.marbles.map(m => ({ ...m, vx: 0, vy: 0 })));
                setGameState('ready');
              }
            } else {
              if (currentStage < stages.length) {
                setCurrentStage(currentStage + 1);
              }
            }
          };

          const handleRetry = () => {
            playSound('click');
            if (isDevMode) {
              // 개발자 모드에서는 현재 devStage로 다시 초기화
              setShooterMarble({
                x: devStage.shooter.x,
                y: devStage.shooter.y,
                vx: 0,
                vy: 0,
                mass: devStage.shooter.mass || 1
              });
              setMarbles(devStage.marbles.map(m => ({ ...m, vx: 0, vy: 0 })));
              setGameState('ready');
            } else if (currentMode === 'userStages') {
              // 사용자 정의 스테이지 모드
              const stage = userStages[currentUserStageIndex];
              if (stage) {
                setShooterMarble({
                  x: stage.stage.shooter.x,
                  y: stage.stage.shooter.y,
                  vx: 0,
                  vy: 0,
                  mass: stage.stage.shooter.mass || 1
                });
                setMarbles(stage.stage.marbles.map(m => ({ ...m, vx: 0, vy: 0 })));
                setGameState('ready');
              }
            } else {
              // 일반 퍼즐 모드
              initStage(currentStage);
            }
          };

          const handleUseHint = () => {
            if (hintsRemaining > 0 && gameState === 'ready') {
              setShowTrajectory(true);
              playSound('click');
              setHintsRemaining(hintsRemaining - 1);
            }
          };

          // UNDO 기능: 이전 상태로 되돌리기
          const handleUndo = () => {
            if (gameHistory.length > 0 && gameState === 'ready') {
              playSound('click');
              const previousState = gameHistory[gameHistory.length - 1];

              // 이전 상태 복원
              setShooterMarble(previousState.shooterMarble);
              setMarbles(previousState.marbles);
              setShotsTaken(previousState.shotsTaken);

              // 히스토리에서 제거
              setGameHistory(prev => prev.slice(0, -1));
            }
          };

          return (
            <div className="min-h-screen bg-gradient-to-br from-amber-950 via-stone-900 to-black flex items-start justify-center p-2 sm:p-4">
              <div className="w-full max-w-[724px]" style={!isDevMode ? {
                transform: `scale(${scale})`,
                transformOrigin: 'top center'
              } : {}}>
                                  <div className="bg-stone-800 rounded-lg shadow-2xl p-[10px] border-2 border-amber-900">
                                    <div className="mb-4">
                                      <div className="flex justify-between items-center mb-3">
                                        <h1 className="text-2xl sm:text-3xl font-bold text-amber-100 flex items-center gap-2">
                                          <div className="w-8 h-8 bg-amber-700 rounded-full shadow-lg"></div>
                                          알까기 퍼즐
                                        </h1>
                                        <div className="flex gap-1 sm:gap-2">
                                          {/* UNDO 버튼 (되돌리기) */}
                                          <button
                                            onClick={handleUndo}
                                            aria-label="되돌리기"
                                            disabled={showSettings || gameHistory.length === 0 || gameState !== 'ready'}
                                            className={`w-9 h-9 flex items-center justify-center rounded-lg transition-colors active:animate-bounce-sm shadow-lg border
                                              ${showSettings || gameHistory.length === 0 || gameState !== 'ready' ? 'bg-stone-800 opacity-30 cursor-not-allowed border-stone-700' : 'bg-orange-600 hover:bg-orange-500 border-orange-500'}
                                            `}
                                          >
                                            <Undo size={18} className="text-white" />
                                          </button>

                                          {/* 설정 버튼 */}
                                          <button
                                            onClick={() => { playSound('click'); setShowSettings(!showSettings); }}
                                            aria-label="설정"
                                            className="w-9 h-9 flex items-center justify-center bg-stone-700 hover:bg-stone-600 text-white rounded-lg shadow-lg border border-stone-600 transition-colors active:animate-bounce-sm"
                                          >
                                            <Settings size={18} />
                                          </button>

                                          {/* 다시하기 버튼 */}
                                          <button
                                            onClick={handleRetry}
                                            aria-label="다시 시작"
                                            disabled={showSettings}
                                            className={`w-9 h-9 flex items-center justify-center rounded-lg shadow-lg border transition-colors active:animate-bounce-sm
                                              ${showSettings ? 'bg-stone-800 opacity-30 cursor-not-allowed border-stone-700' : 'bg-stone-700 hover:bg-stone-600 border-stone-600'}
                                            `}
                                          >
                                            <RotateCcw size={18} className="text-white" />
                                          </button>

                                          {/* 힌트 버튼 */}
                                          <button
                                            onClick={handleUseHint}
                                            aria-label="힌트 사용"
                                            disabled={showSettings || hintsRemaining === 0 || gameState !== 'ready'}
                                            className={`w-9 h-9 flex items-center justify-center rounded-lg shadow-lg border transition-colors active:animate-bounce-sm
                                              ${showSettings || hintsRemaining === 0 || gameState !== 'ready' ? 'bg-stone-800 opacity-30 cursor-not-allowed border-stone-700' : 'bg-yellow-600 hover:bg-yellow-700 border-yellow-500'}
                                            `}
                                          >
                                            <Lightbulb size={18} className="text-white" />
                                          </button>

                                          {/* MODE 모드 버튼 */}
                                          <button
                                            onClick={() => {
                                              playSound('click');
                                              setShowModeMenu(!showModeMenu);
                                            }}
                                            aria-label="게임 모드"
                                            disabled={showSettings}
                                            className={`w-9 h-9 flex items-center justify-center text-[10px] font-bold rounded-lg shadow-lg border transition-colors active:animate-bounce-sm
                                              ${showSettings ? 'bg-stone-800 opacity-30 cursor-not-allowed border-stone-700' : showModeMenu ? 'bg-purple-600 hover:bg-purple-500 border-purple-500 text-white' : 'bg-stone-700 hover:bg-stone-600 border-stone-600 text-gray-400'}
                                            `}
                                          >
                                            MODE
                                          </button>

                                          {/* KR/EN 언어 전환 버튼 */}
                                          <button
                                            onClick={() => { playSound('click'); setLanguage(language === 'KR' ? 'EN' : 'KR'); }}
                                            aria-label="언어 전환"
                                            disabled={showSettings}
                                            className={`w-9 h-9 flex items-center justify-center text-[10px] font-bold rounded-lg shadow-lg border transition-colors active:animate-bounce-sm
                                              ${showSettings ? 'bg-stone-800 opacity-30 cursor-not-allowed border-stone-700' : 'bg-stone-700 hover:bg-stone-600 border-stone-600'}
                                            `}
                                          >
                                            <span className="text-amber-100">{language}</span>
                                          </button>
                                        </div>
                                      </div>
                
                                      {/* 스테이지 선택 컨트롤 */}
                                      <div className="flex items-center justify-between mb-3 bg-stone-700 rounded-lg p-3 border border-amber-900">
                                        <button
                                          onClick={handlePrevStage}
                                          disabled={currentStage === 1 || isDevMode}
                                          className="p-1 sm:p-2 bg-stone-600 hover:bg-stone-500 disabled:bg-stone-800 disabled:opacity-30 disabled:cursor-not-allowed rounded-lg transition-colors active:animate-bounce-sm"
                                        >
                                          <ChevronLeft size={20} className="text-amber-100" />
                                        </button>
                
                                                              <div className="flex-1 mx-1 sm:mx-3">
                                                                {currentMode === 'userStages' ? (
                                                                  <div className="text-center">
                                                                    <div className="text-cyan-100 font-bold text-base sm:text-lg">
                                                                      📁 사용자 스테이지 {currentUserStageIndex + 1} / {userStages.length}
                                                                    </div>
                                                                    <div className="text-slate-400 text-xs sm:text-sm mt-1">
                                                                      {userStages[currentUserStageIndex]?.name || '스테이지 없음'}
                                                                    </div>
                                                                    <div className="flex justify-center mt-1" style={{height: '16px'}}>
                                                                      {/* 빈 공간으로 높이 통일 */}
                                                                    </div>
                                                                  </div>
                                                                ) : (
                                                                  <div className="text-center">
                                                                    <div className="text-amber-100 font-bold text-base sm:text-lg">
                                                                      스테이지 {currentStage} / {stages.length}
                                                                    </div>
                                                                    <div className="text-slate-400 text-xs sm:text-sm mt-1">
                                                                      {stages.find(s => s.id === currentStage)?.name}
                                                                    </div>
                                                                    {/* Display best stars for current stage */}
                                                                    <div className="flex justify-center mt-1">
                                                                      {[...Array(3)].map((_, i) => {
                                                                        const bestStars = parseInt(localStorage.getItem(`stage_${currentStage}_stars`) || '0', 10);
                                                                        return (
                                                                          <Star key={i} size={16} className={`mx-0.5 ${i < bestStars ? 'text-yellow-400' : 'text-gray-500'}`} />
                                                                        );
                                                                      })}
                                                                    </div>
                                                                  </div>
                                                                )}
                                                              </div>                
                                        <button
                                          onClick={handleNextStageButton}
                                          disabled={currentStage === stages.length || isDevMode}
                                          className="p-1 sm:p-2 bg-stone-600 hover:bg-stone-500 disabled:bg-stone-800 disabled:opacity-30 disabled:cursor-not-allowed rounded-lg transition-colors active:animate-bounce-sm"
                                        >
                                          <ChevronRight size={20} className="text-amber-100" />
                                        </button>
                                      </div>
                
                                                          <div className="flex justify-between items-center text-xs sm:text-sm">
                                                            <div className="text-slate-300">
                                                              남은 기회: <span className="text-yellow-400 font-bold">{attemptsLeft === Infinity ? '무한' : attemptsLeft}</span>
                                                            </div>
                                                            <div className="text-slate-300 flex items-center gap-1">
                                                              <Lightbulb size={14} className="text-yellow-400" />
                                                              힌트: <span className="text-yellow-400 font-bold">{hintsRemaining}</span>
                                                            </div>
                                                          </div>
                                                          <div className="flex justify-between items-center text-xs sm:text-sm mt-2">
                                                            <div className="text-slate-300">
                                                              점수: <span className="text-green-400 font-bold">{score}</span>
                                                            </div>
                                                            <div className="text-slate-300">
                                                              최고 점수: <span className="text-purple-400 font-bold">{highScore}</span>
                                                            </div>
                                                          </div>
                                    </div>
                
                                    <div className="relative">
                                                          <canvas
                                                            ref={canvasRef}
                                                            width={CANVAS_SIZE}
                                                            height={CANVAS_SIZE}
                                                            className="border-4 rounded-lg cursor-crosshair bg-stone-900 shadow-2xl border-amber-900"
                                                            style={{ width: '100%', height: 'auto', aspectRatio: '1 / 1', touchAction: 'none' }}
                                                            onPointerDown={handlePointerDown}
                                                            onPointerMove={handlePointerMove}
                                                            onPointerUp={handlePointerUp}
                                                          />

                                                          {/* 개발자 모드 인디케이터 */}
                                                          {isDevMode && showDevPanel && (
                                                            <div className="absolute top-2 left-1/2 transform -translate-x-1/2 z-40">
                                                              <div className={`px-4 py-2 rounded-lg font-bold text-sm shadow-lg border-2 ${
                                                                isTestMode
                                                                  ? 'bg-green-600 border-green-400 text-white'
                                                                  : 'bg-purple-600 border-purple-400 text-white'

                                                                {isTestMode ? '▶️ 테스트 모드' : '🛠️ 편집 모드'}

                                                                          📋 JSON 클립보드 복사
                                                                        </button>

                                                                        {/* JSON 텍스트에서 불러오기 */}
                                                                        <button
                                                                          onClick={() => {
                                                                            const jsonText = prompt('JSON 데이터를 붙여넣으세요:');
                                                                            if (jsonText) {
                                                                              try {
                                                                                const data = JSON.parse(jsonText);
                                                                                if (data.stage) {
                                                                                  setDevStage(data.stage);
                                                                                }
                                                                                if (data.physics) {
                                                                                  setPhysicsConfig(data.physics);
                                                                                }
                                                                                alert('스테이지를 성공적으로 불러왔습니다!');
                                                                              } catch (error) {
                                                                                alert('JSON 파싱 오류: ' + error.message);
                                                                              }
                                                                            }
                                                                          }}
                                                                          className="w-full p-2 bg-cyan-600 hover:bg-cyan-700 rounded text-white text-sm mb-3"
                                                                        >
                                                                          📄 텍스트에서 불러오기
                                                                        </button>

                                                                        {/* 저장된 스테이지 목록 */}
                                                                        {userStages.length > 0 && (
                                                                          <div className="mt-3 pt-3 border-t border-stone-700">
                                                                            <div className="text-cyan-300 text-sm font-bold mb-2">📁 저장된 스테이지 ({userStages.length}개)</div>
                                                                            <div className="max-h-60 overflow-y-auto space-y-2">
                                                                              {userStages.map((stage, index) => (
                                                                                <div key={stage.id} className="p-2 bg-stone-900 rounded border border-stone-700 hover:border-cyan-600 transition-colors">
                                                                                  <div className="flex justify-between items-start mb-1">
                                                                                    <div className="flex-1">
                                                                                      <div className="text-white text-xs font-bold">{stage.name}</div>
                                                                                      <div className="text-slate-400 text-xs mt-1">
                                                                                        🔴 {stage.stage.marbles.length}개 | 🟢 {(stage.stage.springs || []).length}개
                                                                                      </div>
                                                                                    </div>
                                                                                    <div className="flex gap-1">
                                                                                      <button
                                                                                        onClick={() => {
                                                                                          setDevStage(stage.stage);
                                                                                          if (stage.physics) {
                                                                                            setPhysicsConfig(stage.physics);
                                                                                          }
                                                                                          alert(`"${stage.name}" 스테이지를 불러왔습니다!`);
                                                                                        }}
                                                                                        className="px-2 py-1 bg-blue-600 hover:bg-blue-700 rounded text-white text-xs"
                                                                                        title="불러오기"
                                                                                      >
                                                                                        📂
                                                                                      </button>
                                                                                      <button
                                                                                        onClick={() => {
                                                                                          if (confirm(`"${stage.name}" 스테이지를 삭제하시겠습니까?`)) {
                                                                                            const newUserStages = userStages.filter((_, i) => i !== index);
                                                                                            setUserStages(newUserStages);
                                                                                            localStorage.setItem('userCustomStages', JSON.stringify(newUserStages));
                                                                                            alert('삭제되었습니다.');
                                                                                          }
                                                                                        }}
                                                                                        className="px-2 py-1 bg-red-600 hover:bg-red-700 rounded text-white text-xs"
                                                                                        title="삭제"
                                                                                      >
                                                                                        🗑️
                                                                                      </button>
                                                                                    </div>
                                                                                  </div>
                                                                                  <div className="text-slate-500 text-xs">
                                                                                    {new Date(stage.timestamp).toLocaleDateString('ko-KR')}
                                                                                  </div>
                                                                                </div>
                                                                              ))}
                                                                            </div>
                                                                          </div>
                                                                        )}
                                                                      </div>
                                                                    )}
                                                                  </div>

                                                                  {/* 하단 버튼들 */}
                                                                  <div className="border-t border-stone-700 pt-4 mt-4 space-y-2">
                                                                    {/* 테스트 모드 토글 */}
                                                                    <button
                                                                      onClick={() => setIsTestMode(!isTestMode)}
                                                                      className={`w-full py-3 rounded-lg font-bold transition-all ${
                                                                        isTestMode
                                                                          ? 'bg-amber-600 hover:bg-amber-700 text-white'
                                                                          : 'bg-green-600 hover:bg-green-700 text-white'
                                                                      }`}
                                                                    >
                                                                      {isTestMode ? '🛠️ 편집 모드로' : '▶️ 테스트 플레이'}
                                                                    </button>

                                                                    {/* 스테이지 초기화 */}
                                                                    <button
                                                                      onClick={() => {
                                                                        if (confirm('스테이지를 초기화하시겠습니까?')) {
                                                                          setDevStage({
                                                                            marbles: [],
                                                                            shooter: { x: 250, y: 250, mass: 1 },
                                                                            obstacles: [],
                                                                            springs: []
                                                                          });
                                                                        }
                                                                      }}
                                                                      className="w-full bg-orange-600 hover:bg-orange-700 text-white py-2 rounded-lg font-bold"
                                                                    >
                                                                      🗑️ 스테이지 초기화
                                                                    </button>

                                                                    {/* 물리 설정 리셋 */}
                                                                    <button
                                                                      onClick={() => setPhysicsConfig({
                                                                        timeScale: 1.0,
                                                                        friction: 0.98,
                                                                        bounceDamping: 0.7,
                                                                        gravity: 0.0,
                                                                        puckRadius: 15,
                                                                        defaultMass: 1,
                                                                        powerMultiplier: 1.0,
                                                                        collisionEnergyLoss: 0.92
                                                                      })}
                                                                      className="w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg font-bold"
                                                                    >
                                                                      🔄 물리 설정 리셋
                                                                    </button>

                                                                    {/* 퍼즐 모드로 돌아가기 */}
                                                                    <button
                                                                      onClick={() => {
                                                                        setIsDevMode(false);
                                                                        setShowDevPanel(false);
                                                                        setCurrentMode('puzzle');
                                                                        setIsTestMode(false);
                                                                        // 퍼즐 모드로 돌아갈 때 현재 스테이지 초기화
                                                                        initStage(currentStage);
                                                                      }}
                                                                      className="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-bold"
                                                                    >
                                                                      🎮 퍼즐 모드로 돌아가기
                                                                    </button>
                                                                  </div>
                                                                </div>
                                                              </div>
                                                            )}
                                                          </div>
                                    <div className="mt-4 bg-stone-700 border border-amber-900 rounded-lg p-4 shadow-inner">
                                      <h3 className="text-amber-100 font-bold mb-2">조작법</h3>
                                      <ul className="text-slate-300 text-sm space-y-1">
                                        <li>파란 구슬을 클릭하고 드래그하여 방향과 힘을 조절하세요.</li>
                                        <li>모든 빨간 구슬을 보드 밖으로 떨어뜨리면 승리합니다.</li>
                                        <li>매 5스테이지마다 힌트 1개를 획득합니다.</li>
                                      </ul>
                                    </div>
                                  </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MarblePuzzleGame />);
    </script>
</body>
</html>
